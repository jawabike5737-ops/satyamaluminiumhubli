{% extends 'base.html' %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap');

    /* ===== PAGE WRAPPER ===== */
    .ec-wrap {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1.5rem;
        font-family: 'DM Sans', sans-serif;
        background-color: #f5f0e8;
        background-image:
            linear-gradient(90deg, rgba(180, 160, 120, 0.08) 1px, transparent 1px),
            linear-gradient(rgba(180, 160, 120, 0.08) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    /* ===== CARD ===== */
    .ec-card {
        width: 100%;
        max-width: 850px;
        background: #fffdf7;
        border: 1.5px solid #e2d9c8;
        border-radius: 16px;
        overflow: hidden;
        box-shadow:
            0 4px 6px -1px rgba(120, 100, 60, 0.07),
            0 10px 30px -5px rgba(120, 100, 60, 0.10);
    }

    /* ===== HEADER ===== */
    .ec-header {
        padding: 32px 40px 26px;
        border-bottom: 1.5px solid #e8e0d0;
        background: linear-gradient(180deg, #fffdf7 0%, #faf6ee 100%);
        display: flex;
        align-items: flex-start;
        gap: 18px;
        position: relative;
    }

    .ec-header-icon {
        width: 50px;
        height: 50px;
        background: #3d3422;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 2px;
    }

    .ec-header-icon svg {
        width: 24px;
        height: 24px;
        stroke: #f5f0e8;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .ec-header-text { flex: 1; }

    .ec-title {
        margin: 0 0 5px 0;
        font-family: 'Playfair Display', serif;
        font-size: 1.65rem;
        font-weight: 700;
        color: #1e1a0f;
        letter-spacing: -0.01em;
        line-height: 1.2;
    }

    .ec-subtitle {
        margin: 0;
        font-size: 0.875rem;
        color: #8a7d65;
        font-weight: 400;
    }

    .ec-badge {
        position: absolute;
        top: 30px;
        right: 40px;
        display: flex;
        align-items: center;
        gap: 5px;
        background: #f7efe3;
        border: 1px solid #e8d8c0;
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 0.7rem;
        font-weight: 600;
        color: #9c6c2d;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .ec-badge svg {
        width: 12px;
        height: 12px;
        stroke: #9c6c2d;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    /* ===== BODY ===== */
    .ec-body { padding: 30px 40px 32px; }

    /* ===== ERROR ===== */
    .ec-error {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fef2f2;
        border: 1.5px solid #fecaca;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 22px;
        font-size: 0.875rem;
        color: #b91c1c;
        font-weight: 500;
    }

    .ec-error svg {
        width: 16px;
        height: 16px;
        stroke: #ef4444;
        fill: none;
        stroke-width: 1.8;
        flex-shrink: 0;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    /* ===== FORM GRID ===== */
    .ec-form { margin: 0; padding: 0; }

    .ec-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px 28px;
    }

    .ec-field-full { grid-column: 1 / -1; }

    /* ===== FIELD ===== */
    .ec-field { display: flex; flex-direction: column; gap: 7px; }

    .ec-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: #5a4f3a;
        letter-spacing: 0.07em;
        text-transform: uppercase;
    }

    .ec-label .opt {
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
        font-size: 0.72rem;
        color: #a99880;
    }

    .ec-input-wrap { position: relative; }

    .ec-icon {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        display: flex;
        z-index: 2;
    }

    .ec-icon.top {
        top: 14px;
        transform: none;
    }

    .ec-icon svg {
        width: 16px;
        height: 16px;
        stroke: #b5a68a;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.2s ease;
    }

    .ec-field:focus-within .ec-icon svg { stroke: #7a6840; }

    .ec-form input[type="text"],
    .ec-form textarea {
        width: 100%;
        padding: 11px 14px 11px 42px;
        border-radius: 10px;
        border: 1.5px solid #ddd5c0;
        background: #faf8f3;
        color: #1e1a0f;
        font-size: 0.93rem;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        outline: none;
        transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        box-sizing: border-box;
        -webkit-appearance: none;
    }

    .ec-form textarea {
        height: 96px;
        resize: none;
        padding-top: 12px;
        line-height: 1.55;
    }

    .ec-form input[type="text"]::placeholder,
    .ec-form textarea::placeholder {
        color: #c4b89a;
        font-weight: 400;
    }

    .ec-form input[type="text"]:focus,
    .ec-form textarea:focus {
        border-color: #7a6840;
        background: #fffdf7;
        box-shadow: 0 0 0 3px rgba(122, 104, 64, 0.12);
    }

    .ec-char {
        position: absolute;
        bottom: 9px;
        right: 12px;
        font-size: 0.7rem;
        color: #b5a68a;
        pointer-events: none;
        font-weight: 600;
        transition: color 0.2s ease;
    }

    /* ===== SUBMIT ROW ===== */
    .ec-actions {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 10px;
        padding-top: 26px;
        border-top: 1.5px solid #e8e0d0;
    }

    .ec-btn-cancel {
        padding: 11px 24px;
        border-radius: 10px;
        border: 1.5px solid #ddd5c0;
        background: transparent;
        color: #5a4f3a;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
    }

    .ec-btn-cancel:hover {
        background: #f0ebe0;
        border-color: #c9bda4;
    }

    .ec-btn-save {
        padding: 11px 30px;
        border-radius: 10px;
        border: none;
        background: #3d3422;
        color: #f5f0e8;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .ec-btn-save svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .ec-btn-save:hover {
        background: #2a2415;
        box-shadow: 0 4px 14px rgba(61, 52, 34, 0.3);
        transform: translateY(-1px);
    }

    .ec-btn-save:active {
        transform: translateY(0);
        box-shadow: none;
    }

    /* ===== FOOTER ===== */
    .ec-footer {
        padding: 14px 40px 16px;
        border-top: 1.5px solid #e8e0d0;
        background: #fcf8f2;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .ec-footer-info {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: #8a7d65;
        font-weight: 500;
    }

    .ec-footer-info svg {
        width: 13px;
        height: 13px;
        stroke: #9c6c2d;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .ec-footer-id {
        font-size: 0.78rem;
        color: #7b6c5e;
        font-weight: 600;
        letter-spacing: 0.04em;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 680px) {
        .ec-header { padding: 24px; flex-wrap: wrap; }
        .ec-badge { position: static; margin-left: auto; }
        .ec-body { padding: 24px; }
        .ec-grid { grid-template-columns: 1fr; }
        .ec-field-full { grid-column: 1; }
        .ec-actions { flex-direction: column-reverse; }
        .ec-btn-cancel, .ec-btn-save { width: 100%; justify-content: center; }
        .ec-footer { padding: 14px 24px; }
    }
</style>

<div class="ec-wrap">
    <div class="ec-card">

        <!-- Header -->
        <div class="ec-header">
            <div class="ec-header-icon">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </div>
            <div class="ec-header-text">
                <h2 class="ec-title">Edit Customer</h2>
                <p class="ec-subtitle">Update the details below and save your changes</p>
            </div>
            <div class="ec-badge">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Editing record
            </div>
        </div>

        <!-- Body -->
        <div class="ec-body">

            {% if error %}
            <div class="ec-error" role="alert">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="ajax-form ec-form" data-after-success="reload">
                {% csrf_token %}

                <div class="ec-grid">

                    <!-- Customer Name -->
                    <div class="ec-field">
                        <label class="ec-label" for="ec-name">Customer Name</label>
                        <div class="ec-input-wrap">
                            <span class="ec-icon">
                                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </span>
                            <input type="text" id="ec-name" name="name" value="{{ customer.name }}" placeholder="Full name" required autocomplete="name">
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="ec-field">
                        <label class="ec-label" for="ec-phone">Phone Number</label>
                        <div class="ec-input-wrap">
                            <span class="ec-icon">
                                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 10a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3 1.17h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8a16 16 0 0 0 6 6l1.17-1.17a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 15l-.08 1.92z"/></svg>
                            </span>
                            <input type="text" id="ec-phone" name="phone" value="{{ customer.phone }}" placeholder="e.g. +91 98765 43210" required autocomplete="tel">
                        </div>
                    </div>

                    <!-- Address -->
                    <div class="ec-field ec-field-full">
                        <label class="ec-label" for="ec-address">Address <span class="opt">(optional)</span></label>
                        <div class="ec-input-wrap">
                            <span class="ec-icon top">
                                <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            </span>
                            <textarea id="ec-address" name="address" maxlength="200" placeholder="Street, city, state…">{{ customer.address }}</textarea>
                            <span class="ec-char" id="ec-char-count" aria-live="polite">0 / 200</span>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="ec-actions">
                        <a href="javascript:history.back()" class="ec-btn-cancel">Cancel</a>
                        <button type="submit" class="ec-btn-save">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            Save Changes
                        </button>
                    </div>

                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="ec-footer">
            <div class="ec-footer-info">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Changes save immediately
            </div>
            <div class="ec-footer-id">ID #{{ customer.id }}</div>
        </div>

    </div>
</div>

<script>
(function () {
    var ta = document.getElementById('ec-address');
    var cc = document.getElementById('ec-char-count');
    if (ta && cc) {
        function update() {
            var l = ta.value.length;
            cc.textContent = l + ' / 200';
            cc.style.color = l > 170 ? '#b91c1c' : '#b5a68a';
        }
        update();
        ta.addEventListener('input', update);
    }
})();
</script>

{% endblock %}
