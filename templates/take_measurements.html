{% extends 'base.html' %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<style>
/* ==========================================================================
   ULTRA-PREMIUM MEASUREMENTS UI
   ========================================================================== */

:root {
    --bg-page: #f0f4f8;
    --card-bg: #ffffff;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --primary-glow: rgba(79, 70, 229, 0.25);
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --input-bg: #f8fafc;
    --danger: #ef4444;
    --danger-light: #fef2f2;
    --radius-lg: 20px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow-soft: 0 4px 20px rgba(15, 23, 42, 0.04);
    --shadow-hover: 0 12px 30px rgba(15, 23, 42, 0.08);
}

html, body { height: 100%; }
body {
    margin: 0;
    background: radial-gradient(circle at top center, #ffffff, var(--bg-page));
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
}

.container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
}

/* ===== TOOLBAR ===== */
.toolbar {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
    background: var(--card-bg);
    padding: 16px 24px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(255, 255, 255, 0.5);
    animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.customer-name-badge {
    margin-left: auto;
    font-size: 14px;
    color: var(--text-muted);
    background: var(--input-bg);
    padding: 8px 16px;
    border-radius: 30px;
    border: 1px solid var(--border);
}

.customer-name-badge strong {
    color: var(--primary);
}

/* ===== BUTTONS ===== */
button {
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.primary {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: var(--radius-md);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 15px var(--primary-glow);
}

.primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px var(--primary-glow);
    filter: brightness(1.05);
}

.secondary {
    background: #ffffff;
    border: 1px solid var(--border);
    padding: 11px 18px;
    border-radius: var(--radius-md);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-main);
    text-decoration: none;
}

.secondary:hover {
    background: var(--input-bg);
    border-color: #cbd5e1;
    transform: translateY(-1px);
}

.icon-btn {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--card-bg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
}

.icon-btn:hover {
    background: var(--danger-light);
    color: var(--danger);
    border-color: #fca5a5;
    transform: scale(1.05);
}

.action-btn {
    background: transparent;
    border: 0;
    cursor: pointer;
    color: var(--text-muted);
    padding: 8px;
    font-size: 18px;
    border-radius: var(--radius-sm);
}

.action-btn:hover {
    background: var(--input-bg);
    color: var(--primary);
}

/* ===== ITEM CARDS ===== */
.card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(226, 232, 240, 0.8);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 4px; height: 100%;
    background: linear-gradient(to bottom, #6366f1, #a855f7);
    border-radius: var(--radius-lg) 0 0 var(--radius-lg);
}

.card:hover {
    box-shadow: var(--shadow-hover);
}

.card.fade-out {
    opacity: 0;
    transform: scale(0.95);
    transition: all 0.3s ease;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
}

.card-title {
    font-weight: 600;
    color: var(--text-main);
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
}

/* ===== INPUTS & SELECTS ===== */
input, select {
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--input-bg);
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    color: var(--text-main);
    transition: all 0.25s ease;
    box-sizing: border-box;
}

input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    background: #ffffff;
    box-shadow: 0 0 0 4px var(--primary-glow);
}

/* TomSelect Custom Overrides */
.ts-control {
    border: 2px solid var(--border) !important;
    border-radius: var(--radius-md) !important;
    background: var(--input-bg) !important;
    padding: 10px 14px !important;
    font-family: 'Poppins', sans-serif;
    min-width: 250px;
}
.ts-control.focus {
    border-color: var(--primary) !important;
    background: #ffffff !important;
    box-shadow: 0 0 0 4px var(--primary-glow) !important;
}

/* ===== TABLE LAYOUT ===== */
.subtable {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px;
    margin-top: 10px;
}

.subtable th {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0 12px 8px 12px;
    text-align: left;
}

.subtable td {
    padding: 8px 12px;
    vertical-align: middle;
}

.subtable input {
    width: 100%;
    text-align: center;
}

/* Custom Area Column Styling */
.area {
    font-weight: 700;
    color: var(--primary);
    background: #eef2ff;
    padding: 8px 16px !important;
    border-radius: var(--radius-sm);
    text-align: center;
    display: inline-block;
    min-width: 60px;
}

/* ===== QUANTITY CONTROL ===== */
.qty-control {
    display: inline-flex;
    align-items: center;
    background: var(--input-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    height: 44px;
}

.qty-control button {
    width: 40px;
    height: 100%;
    border: 0;
    background: transparent;
    cursor: pointer;
    color: var(--text-main);
    font-size: 20px;
    font-weight: 500;
}

.qty-control button:hover {
    background: #e2e8f0;
    color: var(--primary);
}

.qty-control input {
    width: 50px;
    height: 100%;
    border: none;
    border-left: 2px solid var(--border);
    border-right: 2px solid var(--border);
    border-radius: 0;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
    padding: 0;
}

/* ===== SUMMARY BAR ===== */
.summary {
    display: flex;
    gap: 16px;
    justify-content: flex-end;
    margin-top: 30px;
    padding: 20px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-hover);
    border: 1px solid var(--border);
    animation: slideUpFade 0.6s ease forwards;
}

.summary .box {
    background: var(--input-bg);
    padding: 16px 24px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    font-weight: 500;
    font-size: 14px;
    color: var(--text-muted);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
}

.summary .box span:first-of-type {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-main);
}

#totalPrice {
    color: var(--primary) !important;
}

/* ===== ITEM TOTAL BOTTOM ===== */
.item-footer-controls {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
}

.price-container {
    margin-left: auto;
    display: flex;
    gap: 16px;
    align-items: center;
    background: var(--input-bg);
    padding: 8px 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
}

.price-container input.price {
    width: 90px;
    padding: 8px;
    text-align: right;
    border-color: #cbd5e1;
}

.item-total-badge {
    font-weight: 700;
    font-size: 18px;
    color: var(--primary);
}

.error-msg {
    background: var(--danger-light);
    color: var(--danger);
    padding: 14px 20px;
    border-radius: var(--radius-md);
    margin-bottom: 20px;
    font-weight: 600;
    border: 1px solid #fca5a5;
    animation: shake 0.4s ease-in-out;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .card-header { flex-direction: column; align-items: stretch; }
    .card-title { flex-direction: column; align-items: flex-start; }
    .card-title .ts-wrapper { width: 100%; }
    .summary { flex-direction: column; align-items: stretch; }
    .price-container { flex-direction: column; align-items: stretch; margin-left: 0; width: 100%; }
    .item-footer-controls { flex-direction: column; align-items: stretch; }
}

/* ===== ANIMATIONS ===== */
.fade-in { animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

@keyframes slideUpFade {
    from { transform: translateY(40px) scale(0.98); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
}

@keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}
</style>

<div class="container" data-customer-id="{{ customer.id }}">

    <div class="toolbar">
        <button class="primary" id="addItemBtn">
            <span style="font-size:16px; margin-right:4px;">+</span> Add Item
        </button>
        <button class="primary" id="saveBtn">Save Measurements</button>
        <a class="secondary" href="{% url 'customers' %}">Back</a>
        
        <div class="customer-name-badge">
            Client: <strong>{{ customer.name }}</strong>
        </div>
    </div>

    <div id="items"></div>

    <div id="formError" class="error-msg" style="display:none"></div>

    <div class="summary" id="summary" style="display:none">
        <div class="box">
            Total Quantity
            <span id="totalQty">0</span>
        </div>
        <div class="box">
            Total Area (Sq Ft)
            <span id="totalArea">0</span> 
        </div>
        <div class="box" style="background: #eef2ff; border-color: #c7d2fe;">
            Total Amount (₹)
            <span id="totalPrice">0.00</span>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<template id="itemTpl">
<div class="card item-card fade-in">
    <div class="card-header">
        <div style="flex: 1;">
            <div class="card-title">
                <span style="color:var(--text-muted); font-size: 13px; text-transform:uppercase;">Item Selection:</span>
                <select class="service-select" placeholder="Search or type a new item..." style="min-width:300px"></select>
            </div>
            <div style="font-size:13px; color:var(--text-muted); margin-top:12px; display:flex; align-items:center; gap:8px;">
                Description: 
                <input class="desc" placeholder="Add optional details..." style="border:none; background:transparent; border-bottom:2px dashed var(--border); border-radius:0; width:60%; padding:4px;">
            </div>
        </div>
        
        <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
            <select class="itype" title="Measurement Type">
                <option value="size">Height × Width</option>
                <option value="length">Length / RFT</option>
                <option value="nos">Nos (Count)</option>
            </select>
            <select class="unit" title="Unit">
                <option>Sq Ft</option>
                <option>Feet</option>
                <option>Inch</option>
                <option>Nos</option>
                <option>RFT</option>
            </select>
            <button class="icon-btn" title="Remove entire item" onclick="confirmRemoveItem(this)">🗑️</button>
        </div>
    </div>

    <table class="subtable">
        <thead>
            <tr class="size-headers">
                <th style="width:22%">Height</th>
                <th style="width:22%">Width</th>
                <th style="width:20%; text-align:center;">Quantity</th>
                <th style="width:18%; text-align:center;">Area</th>
                <th style="width:18%; text-align:right;">Actions</th>
            </tr>
            <tr class="length-headers" style="display:none">
                <th>Length</th>
                <th style="text-align:center;">Qty</th>
                <th colspan="3"></th>
            </tr>
            <tr class="nos-headers" style="display:none">
                <th style="text-align:center;">Qty</th>
                <th colspan="4"></th>
            </tr>
        </thead>
        <tbody class="subbody"></tbody>
    </table>

    <div class="item-footer-controls">
        <button class="secondary" onclick="addSub(this)">+ Add Row</button>
        <button class="secondary" onclick="duplicateRow(this)">Duplicate Last Row</button>
        
        <div class="price-container">
            <span style="font-size:13px; font-weight:600; color:var(--text-muted)">Price/Unit: ₹</span>
            <input class="price" inputmode="decimal" value="0">
            
            <div style="width:1px; height:30px; background:var(--border); margin:0 10px;"></div>
            
            <div style="font-size:13px; font-weight:600; color:var(--text-muted); display:flex; align-items:center; gap:8px;">
                Total: 
                <span class="item-total-badge">₹ <span class="item-total">0.00</span></span>
            </div>
        </div>
    </div>

</div>
</template>

<script>
// =======================================================
// JS remains UNCHANGED (Exactly as provided to preserve logic)
// =======================================================
function $(sel, root=document){return root.querySelector(sel)}
function $all(sel, root=document){return Array.from(root.querySelectorAll(sel))}

const itemsContainer = document.getElementById('items');
const addItemBtn = document.getElementById('addItemBtn');
const saveBtn = document.getElementById('saveBtn');
const summaryBox = document.getElementById('summary');
const totalQtyEl = document.getElementById('totalQty');
const totalAreaEl = document.getElementById('totalArea');
const totalPriceEl = document.getElementById('totalPrice');
const formError = document.getElementById('formError');
const CUSTOMER_ID = document.querySelector('.container')?.dataset?.customerId || null;

let SERVICES = [];

addItemBtn.addEventListener('click', addItem);
saveBtn.addEventListener('click', saveMeasurements);

function loadServices(){
    return fetch('/api/services/', { credentials: 'same-origin' })
        .then(r => {
            if (r.status === 401) {
                formError.innerText = 'Session expired. Please log in again.';
                formError.style.display = 'block';
                setTimeout(() => { window.location.href = '/login/'; }, 1200);
                throw new Error('Unauthorized');
            }
            if (!r.ok) throw new Error('Network response was not ok');
            return r.json();
        })
        .then(data => {
            SERVICES = data.map(s => ({ id: String(s.id), name: s.name, description: s.description, price: s.price }));
            document.querySelectorAll('.service-select').forEach(sel => {
                if (sel.tom) {
                    try { sel.tom.clearOptions(); sel.tom.addOptions(SERVICES); } catch(e){ }
                } else {
                    const card = sel.closest('.item-card') || document;
                    initServiceSelect(sel, card);
                }
            });
            return SERVICES;
        })
        .catch(err => {
            console.error('Could not load services', err);
            SERVICES = [];
            formError.innerText = 'Could not load services. Check your network or login status.';
            formError.style.display = 'block';
            setTimeout(()=> formError.style.display='none', 4000);
            return Promise.resolve(SERVICES);
        });
}

function initServiceSelect(selectEl, card){
    if(selectEl.tom){
        try{ selectEl.tom.clearOptions(); selectEl.tom.addOptions(SERVICES); selectEl.tom.refreshOptions(false); return; }catch(e){ }
    }
    const ts = new TomSelect(selectEl, {
        valueField: 'id',
        labelField: 'name',
        searchField: ['name','description'],
        options: [],
        maxOptions: 50,
        create: function(input, callback) {
            const csrftoken = getCookie('csrftoken');
            fetch('/api/create-service/', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
                body: JSON.stringify({ name: input })
            }).then(r => {
                if (r.status === 401) {
                    formError.innerText = 'Session expired. Please log in.';
                    formError.style.display = 'block';
                    setTimeout(() => window.location.href = '/login/', 1000);
                    throw new Error('Unauthorized');
                }
                if (!r.ok) throw new Error('Failed to create service');
                return r.json();
            }).then(data => {
                const opt = { id: String(data.id), name: data.name, description: data.description, price: data.price };
                SERVICES.push(opt);
                try { this.addOption(opt); this.addItem(String(data.id)); } catch(e){ }
                try {
                    const desc = card.querySelector('.desc');
                    const priceInput = card.querySelector('.price');
                    if(desc) desc.value = data.description || data.name;
                    if(priceInput) priceInput.value = Number(data.price||0).toFixed(2);
                    computeTotals();
                } catch(e){}
                callback(opt);
            }).catch(err => {
                formError.innerText = 'Could not create service. Try again.';
                formError.style.display = 'block';
                setTimeout(()=> formError.style.display='none', 3000);
                callback();
            });
        },
        onChange: function(value){
            const desc = card.querySelector('.desc');
            const priceInput = card.querySelector('.price');
            if(!value) return;
            if(/^[\d]+$/.test(String(value))){
                const s = SERVICES.find(x=>String(x.id)===String(value));
                if(s){
                    if(desc) desc.value = s.description || s.name;
                    if(priceInput) priceInput.value = Number(s.price).toFixed(2);
                }
            } else {
                if(desc) desc.value = value;
            }
            computeTotals();
        }
    });
    if (SERVICES.length > 0) {
        try{ ts.addOptions(SERVICES); ts.refreshOptions(false); }catch(e){}
    }
    selectEl.tom = ts;
}

async function addItem(){
    const tpl = document.getElementById('itemTpl');
    const node = tpl.content.cloneNode(true);
    const card = node.querySelector('.item-card');
    const itype = card.querySelector('.itype');
    itype.addEventListener('change', ()=>{ toggleType(card, itype.value); card.querySelector('.subbody').innerHTML=''; computeTotals(); });
    itemsContainer.appendChild(card);
    const sel = card.querySelector('.service-select');
    if(SERVICES.length===0){ await loadServices(); }
    initServiceSelect(sel, card);
    card.querySelector('.price').addEventListener('input', ()=> computeTotals());
    addSub(card);
    return card;
}

async function loadSavedMeasurements(customerId){
    try{
            const measurementsUrl = customerId ? `/api/get-measurements/${customerId}/` : "{% url 'get_measurements_json' customer.id %}";
            const r = await fetch(measurementsUrl, { credentials: 'same-origin' });
        if(r.status===401){ formError.innerText='Session expired. Please log in.'; formError.style.display='block'; setTimeout(()=> window.location.href='/login/',1000); return; }
        if(!r.ok) throw new Error('Network error');
        const data = await r.json();
        const items = data.items || [];
        if(items.length===0){ await addItem(); return; }

        itemsContainer.innerHTML = '';

        for(const it of items){
            const card = await addItem();
            const desc = card.querySelector('.desc');
            const priceInput = card.querySelector('.price');
            const itype = card.querySelector('.itype');
            const unit = card.querySelector('.unit');
            if(itype && it.item_type) { itype.value = it.item_type; toggleType(card, it.item_type); }
            if(unit && it.unit) unit.value = it.unit;
            if(desc) desc.value = it.description || '';
            if(priceInput) priceInput.value = Number(it.price_per_unit||0).toFixed(2);

            card.querySelector('.subbody').innerHTML = '';
            if(Array.isArray(it.subs) && it.subs.length){
                for(const s of it.subs){
                    addSub(card);
                    const last = card.querySelector('.subbody tr:last-child');
                    if(!last) continue;
                    if(s.height !== null && last.querySelector('.h')) last.querySelector('.h').value = s.height;
                    if(s.width !== null && last.querySelector('.w')) last.querySelector('.w').value = s.width;
                    if(s.length !== null && last.querySelector('.length')) last.querySelector('.length').value = s.length;
                    if(last.querySelector('.q')) last.querySelector('.q').value = (s.quantity||1);
                    onRowChange(last);
                }
            } else { addSub(card); }

            const sel = card.querySelector('.service-select');
            try{
                if(it.service_id){
                    if(sel && sel.tom) sel.tom.setValue(String(it.service_id));
                } else if(it.custom_item_name){
                    const custom = String(it.custom_item_name);
                    if(sel && sel.tom){
                        try{ sel.tom.addOption({ id: custom, name: custom }); }catch(e){}
                        try{ sel.tom.setValue(custom); }catch(e){}
                    }
                }
            }catch(e){}
        }
        computeTotals();
    }catch(err){ await addItem(); }
}

function toggleType(card, val){
    card.querySelector('.size-headers').style.display = val==='size' ? '' : 'none';
    card.querySelector('.length-headers').style.display = val==='length' ? '' : 'none';
    card.querySelector('.nos-headers').style.display = val==='nos' ? '' : 'none';
}

function confirmRemoveItem(btn){
    const card = btn.closest('.item-card');
    if(!confirm('Remove this entire item card?')) return;
    card.classList.add('fade-out');
    card.addEventListener('transitionend', ()=>card.remove(), {once:true});
    setTimeout(computeTotals, 350);
}

function addSub(btnOrCard){
    const card = btnOrCard.closest ? btnOrCard.closest('.item-card') : btnOrCard;
    const type = card.querySelector('.itype').value;
    const tbody = card.querySelector('.subbody');
    const tr = document.createElement('tr');

    if(type==='size'){
        tr.innerHTML = `
            <td><input class="h" inputmode="decimal" placeholder="H"></td>
            <td><input class="w" inputmode="decimal" placeholder="W"></td>
            <td style="text-align:center;"><div class="qty-control"><button class="decr">−</button><input class="q" value="1"><button class="incr">+</button></div></td>
            <td style="text-align:center;"><span class="area">0</span></td>
            <td style="text-align:right;"><button class="action-btn" onclick="dupSub(this)">⎘</button> <button class="action-btn" onclick="confirmRemoveRow(this)">✖</button></td>
        `;
        tbody.appendChild(tr);
        const h = tr.querySelector('.h'), w = tr.querySelector('.w'), q = tr.querySelector('.q');
        tr.querySelector('.incr').addEventListener('click', ()=>{ const cur = parseFloat(q.value||0); q.value = Math.max(1, (isNaN(cur)?0:cur) + 1); onRowChange(tr); });
        tr.querySelector('.decr').addEventListener('click', ()=>{ const cur = parseFloat(q.value||0); q.value = Math.max(1, (isNaN(cur)?0:cur) - 1); onRowChange(tr); });
        [h,w,q].forEach(el=> el.addEventListener('input', ()=> onRowChange(tr)));
    } else if(type==='length'){
        tr.innerHTML = `
            <td><input class="length" inputmode="decimal" placeholder="L"></td>
            <td style="text-align:center;"><div class="qty-control"><button class="decr">−</button><input class="q" value="1"><button class="incr">+</button></div></td>
            <td colspan="3" style="text-align:right;"><button class="action-btn" onclick="dupSub(this)">⎘</button> <button class="action-btn" onclick="confirmRemoveRow(this)">✖</button></td>
        `;
        tbody.appendChild(tr);
        const l = tr.querySelector('.length'), q = tr.querySelector('.q');
        tr.querySelector('.incr').addEventListener('click', ()=>{ const cur = parseFloat(q.value||0); q.value = Math.max(1, (isNaN(cur)?0:cur) + 1); onRowChange(tr); });
        tr.querySelector('.decr').addEventListener('click', ()=>{ const cur = parseFloat(q.value||0); q.value = Math.max(1, (isNaN(cur)?0:cur) - 1); onRowChange(tr); });
        [l,q].forEach(el=> el && el.addEventListener('input', ()=> onRowChange(tr)));
    } else {
        tr.innerHTML = `
            <td style="text-align:center;"><div class="qty-control"><button class="decr">−</button><input class="q" value="1"><button class="incr">+</button></div></td>
            <td colspan="4" style="text-align:right;"><button class="action-btn" onclick="dupSub(this)">⎘</button> <button class="action-btn" onclick="confirmRemoveRow(this)">✖</button></td>
        `;
        tbody.appendChild(tr);
        const q = tr.querySelector('.q');
        tr.querySelector('.incr').addEventListener('click', ()=>{ const cur = parseFloat(q.value||0); q.value = Math.max(1, (isNaN(cur)?0:cur) + 1); onRowChange(tr); });
        tr.querySelector('.decr').addEventListener('click', ()=>{ const cur = parseFloat(q.value||0); q.value = Math.max(1, (isNaN(cur)?0:cur) - 1); onRowChange(tr); });
        q.addEventListener('input', ()=> onRowChange(tr));
    }
    computeTotals();
}

function confirmRemoveRow(btn){ if(!confirm('Remove this dimension row?')) return; btn.closest('tr').remove(); computeTotals(); }

function dupSub(btn){ 
    const tr = btn.closest('tr'); const card = btn.closest('.item-card'); const tbody = card.querySelector('.subbody'); const clone = tr.cloneNode(true); tbody.insertBefore(clone, tr.nextSibling); 
    clone.querySelectorAll('input').forEach(i=> i.addEventListener('input', ()=> onRowChange(clone)));
    clone.querySelectorAll('.incr').forEach(b=> b.addEventListener('click', ()=> { const q=clone.querySelector('.q'); const cur = parseFloat(q.value||0); q.value = (isNaN(cur)?0:cur) + 1; onRowChange(clone); }));
    clone.querySelectorAll('.decr').forEach(b=> b.addEventListener('click', ()=> { const q=clone.querySelector('.q'); const cur = parseFloat(q.value||0); q.value = Math.max(1, (isNaN(cur)?0:cur) - 1); onRowChange(clone); }));
    computeTotals(); 
}

function duplicateRow(btn){ const card = btn.closest('.item-card'); const last = card.querySelector('.subbody tr:last-child'); if(last) dupSub(last); }

function onRowChange(tr){
    const card = tr.closest('.item-card');
    const type = card.querySelector('.itype').value;
    const qEl = tr.querySelector('.q'); let q = 1; if(qEl){ const qp = parseFloat(qEl.value||0); q = Math.max(1, isNaN(qp)?1:qp); qEl.value = q; }

    if(type==='size'){
        const h = parseFloat(tr.querySelector('.h').value)||0; const w = parseFloat(tr.querySelector('.w').value)||0;
        if(h>0 && w>0){
            const tbody = tr.parentElement; const key = h.toFixed(3)+'x'+w.toFixed(3);
            for(const r of tbody.querySelectorAll('tr')){
                if(r===tr) continue;
                const hh = r.querySelector('.h') ? parseFloat(r.querySelector('.h').value||0) : null;
                const ww = r.querySelector('.w') ? parseFloat(r.querySelector('.w').value||0) : null;
                if(hh!==null && ww!==null && hh.toFixed(3)+ 'x' + ww.toFixed(3) === key){ const qf = r.querySelector('.q'); const qfp = parseFloat(qf.value||0); qf.value = Math.max(1, (isNaN(qfp)?0:qfp) + q); tr.remove(); updateArea(r); computeTotals(); return; }
            }
        }
        updateArea(tr);
    } else if(type==='length'){
        const l = parseFloat(tr.querySelector('.length')?.value||0);
        tr.querySelector('.area') ? tr.querySelector('.area').innerText = (l*q).toFixed(3) : null;
    }
    computeTotals();
}

function updateArea(tr){ const h = parseFloat(tr.querySelector('.h').value||0); const w = parseFloat(tr.querySelector('.w').value||0); const qv = parseFloat(tr.querySelector('.q').value||0); const q = (isNaN(qv)||qv<1) ? 1 : qv; if(h<=0||w<=0){ tr.querySelector('.area').innerText = '0'; return; } tr.querySelector('.area').innerText = (h*w*q).toFixed(3); }

function computeTotals(){ 
    let totalQty=0, totalArea=0, grandTotal=0; 
    $all('.item-card').forEach(card=>{ 
        const type = card.querySelector('.itype').value; 
        const price = parseFloat((card.querySelector('.price')||{value:0}).value)||0; 
        let itemTotal = 0; 
        card.querySelectorAll('.subbody tr').forEach(tr=>{ 
            const qv = parseFloat((tr.querySelector('.q')||{value:1}).value||0); const q = (isNaN(qv)?0:qv);
            totalQty += q; 
            if(type==='size'){ 
                const a = parseFloat((tr.querySelector('.area')||{innerText:0}).innerText)||0; 
                totalArea += a; itemTotal += a * price; 
            } else if(type==='length'){ 
                const l = parseFloat((tr.querySelector('.length')||{value:0}).value)||0; 
                const val = l * q; totalArea += val; itemTotal += val * price; 
            } else { itemTotal += q * price; } 
        }); 
        card.querySelector('.item-total').innerText = Number(itemTotal||0).toFixed(2); 
        grandTotal += itemTotal; 
    }); 
    totalQtyEl.innerText = totalQty; 
    totalAreaEl.innerText = Number(totalArea).toFixed(3); 
    totalPriceEl.innerText = Number(grandTotal||0).toFixed(2); 
    summaryBox.style.display = totalQty>0 ? 'flex' : 'none'; 
}

function getCookie(name){ let v=null; if(document.cookie){ document.cookie.split(';').forEach(c=>{ let [k,val]=c.trim().split('='); if(k===name) v=decodeURIComponent(val); }); } return v; }

function saveMeasurements(){
    formError.style.display='none';
    const payload = { items: [] };
    let valid=true;
    $all('.item-card').forEach(card=>{
        const desc = (card.querySelector('.desc').value||'').trim();
        const serviceSel = card.querySelector('.service-select');
        const serviceVal = serviceSel ? serviceSel.value : null;
        const custom_name = (!serviceVal || !/^\d+$/.test(String(serviceVal))) ? serviceVal : null;
        const item_type = card.querySelector('.itype').value;
        const unit = card.querySelector('.unit').value;
        const price_per_unit = parseFloat((card.querySelector('.price')||{value:0}).value)||0;
        const subs = [];
        card.querySelectorAll('.subbody tr').forEach(tr=>{
            const qv = parseFloat((tr.querySelector('.q')||{value:1}).value||0); const q = (isNaN(qv)?1:qv);
            if(item_type==='size'){
                const h = tr.querySelector('.h').value; const w = tr.querySelector('.w').value;
                if(!h||!w||parseFloat(h)<=0||parseFloat(w)<=0) valid=false;
                subs.push({ height: h||null, width: w||null, quantity: q });
            } else if(item_type==='length'){
                const l = tr.querySelector('.length').value;
                if(!l||parseFloat(l)<=0) valid=false;
                subs.push({ length: l||null, quantity: q });
            } else { subs.push({ quantity: q }); }
        });
        if(subs.length>0) payload.items.push({ description: desc||'Item', service_id: (/^\d+$/.test(String(serviceVal)) ? serviceVal : null), custom_item_name: custom_name, item_type, unit, price_per_unit, subs });
    });

    if(!valid){ formError.innerText='Please enter valid (non-zero) dimensions'; formError.style.display='block'; return; }
    if(payload.items.length===0){ formError.innerText='Add at least one row before saving'; formError.style.display='block'; return; }

    const csrftoken = getCookie('csrftoken');
    saveBtn.disabled=true; const prev = saveBtn.innerText; saveBtn.innerText='Saving...';

    const saveUrl = CUSTOMER_ID ? `/customer/${CUSTOMER_ID}/measurements/save/` : "{% url 'save_measurements' customer.id %}";
    fetch(saveUrl, { method:'POST', headers:{ 'Content-Type':'application/json', 'X-CSRFToken': csrftoken }, credentials:'same-origin', body: JSON.stringify(payload) })
        .then(r=>r.json())
        .then(data=>{
            if(data.error){ formError.innerText = data.error || 'Could not save'; formError.style.display='block'; saveBtn.disabled=false; saveBtn.innerText=prev; return; }
            saveBtn.innerText='Saved Successfully';
            // Open the measurement PDF in a new tab if pdf_url is present
            if(data.pdf_url){
                window.open(data.pdf_url, '_blank');
            }
            setTimeout(()=>{ saveBtn.innerText=prev; saveBtn.disabled=false; window.location.href='{% url "customers" %}'; },700);
        }).catch(err=>{ formError.innerText='Could not save'; formError.style.display='block'; saveBtn.disabled=false; saveBtn.innerText=prev; });
}

loadServices().then(()=> loadSavedMeasurements(CUSTOMER_ID));
</script>

{% endblock %}
