{% extends 'base.html' %}

{% block content %}
<style>
    :root {
        --primary: #6366f1;
        --primary-glow: rgba(99, 102, 241, 0.5);
        --bg-slate: #f8fafc;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --white: #ffffff;
    }

    .attendance-wrapper {
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        perspective: 1000px;
    }

    /* ===== ANIMATED TITLE ===== */
    .page-title {
        text-align: center;
        font-family: 'Inter', sans-serif;
        color: rgb(0, 0, 0);
        margin-bottom: 2rem;
        opacity: 0;
        transform: translateY(-20px);
        animation: slideDown 0.6s ease forwards;
    }

    .page-title span {
        color: var(--primary);
        font-weight: 800;
    }

    /* ===== THE MODERN CARD ===== */
    .attendance-card {
        width: 100%;
        max-width: 440px;
        background: var(--white);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(226, 232, 240, 0.8);
        position: relative;
        overflow: hidden;
        opacity: 0;
        transform: scale(0.95);
        animation: cardEntry 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Decor element */
    .attendance-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 5px;
        background: linear-gradient(90deg, #6366f1, #a855f7);
    }

    /* ===== INPUT STYLING ===== */
    .form-group {
        margin-bottom: 24px;
        opacity: 0;
        animation: fadeInUp 0.5s ease forwards;
    }

    .form-group:nth-child(1) { animation-delay: 0.2s; }
    .form-group:nth-child(2) { animation-delay: 0.3s; }
    .form-group:nth-child(3) { animation-delay: 0.4s; }

    label {
        display: block;
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 8px;
    }

    input[type="date"], select {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #f1f5f9;
        border-radius: 12px;
        font-size: 1rem;
        background: #f8fafc;
        color: var(--text-main);
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    input:focus, select:focus {
        outline: none;
        border-color: var(--primary);
        background: var(--white);
        box-shadow: 0 0 0 4px var(--primary-glow);
    }

    /* ===== OVERTIME TOGGLE ===== */
    .overtime-container {
        background: #f1f5f9;
        padding: 15px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: 0.3s;
        border: 2px solid transparent;
        margin-bottom: 30px;
    }

    .overtime-container:hover {
        background: #eef2ff;
        border-color: var(--primary-glow);
    }

    .overtime-container span {
        font-weight: 600;
        color: var(--text-main);
    }

    /* Custom Checkbox */
    .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #cbd5e1;
        transition: .4s;
        border-radius: 34px;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 18px; width: 18px;
        left: 3px; bottom: 3px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* ===== ACTION BUTTON ===== */
    .submit-btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 14px;
        background: var(--primary);
        color: white;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 20px var(--primary-glow);
    }

    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px var(--primary-glow);
        filter: brightness(1.1);
    }

    .submit-btn:active {
        transform: scale(0.98);
    }

    /* ===== NOTIFICATIONS ===== */
    .alert-toast {
        max-width: 440px;
        width: 100%;
        padding: 12px 20px;
        border-radius: 12px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 0.9rem;
        animation: slideInRight 0.5s ease-out forwards;
    }

    .already-marked { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .error-alert { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

    /* ===== KEYFRAMES ===== */
    @keyframes cardEntry {
        to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideDown {
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
        from { opacity: 0; transform: translateX(30px); }
        to { opacity: 1; transform: translateX(0); }
    }
</style>

<div class="attendance-wrapper">
    
    <h2 class="page-title">Mark Attendance for <span>{{ emp.name }}</span></h2>

    {% if already_marked %}
        <div class="alert-toast already-marked">
            ⚠️ Attendance already marked today
        </div>
    {% endif %}

    {% if error %}
        <div class="alert-toast error-alert">
            ❌ {{ error }}
        </div>
    {% endif %}

    <div class="attendance-card">
        <form method="POST" class="ajax-form" data-after-success="reload">
            {% csrf_token %}

            <div class="form-group">
                <label>Effective Date</label>
                <input type="date" name="date" required id="attendance-date">
            </div>

            <div class="form-group">
                <label>Attendance Status</label>
                <select name="status">
                    <option value="full">Full Day</option>
                    <option value="half">Half Day</option>
                    <option value="leave">Leave</option>
                    <option value="out">Out of City Work</option>
                </select>
            </div>

            <label class="overtime-container" for="overtime-check">
                <span>Include Overtime Salary</span>
                <div class="switch">
                    <input type="checkbox" name="overtime" id="overtime-check">
                    <span class="slider"></span>
                </div>
            </label>

            <button type="submit" class="submit-btn">
                Confirm Attendance
            </button>
        </form>
    </div>
</div>

<script>
    // Set default date to today automatically
    document.getElementById('attendance-date').valueAsDate = new Date();
</script>

{% endblock %}
