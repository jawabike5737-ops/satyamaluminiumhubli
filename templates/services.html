{% extends 'base.html' %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

    :root {
        --bg:           #f7f5f0;
        --surface:      #ffffff;
        --surface-2:    #faf9f6;
        --border:       #e9e4db;
        --border-soft:  #f0ece5;
        --ink:          #1a1714;
        --ink-2:        #3d3830;
        --ink-3:        #7c7468;
        --ink-4:        #b0a89e;
        --accent:       #c2410c;
        --accent-soft:  #fff4ef;
        --green:        #15803d;
        --green-soft:   #f0fdf4;
        --blue:         #1d4ed8;
        --blue-soft:    #eff6ff;
        --red:          #b91c1c;
        --red-soft:     #fef2f2;
        --shadow-sm:    0 1px 2px rgba(0,0,0,0.05);
        --shadow-md:    0 4px 16px rgba(0,0,0,0.07);
        --shadow-lg:    0 8px 32px rgba(0,0,0,0.1);
        --r:            12px;
        --r-lg:         16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
    }

    /* grain texture */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
    }

    /* ── WRAPPER — full width with comfortable padding ── */
    .page-wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 2rem 4rem;
    }

    /* ── HEADER ── */
    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
        animation: fadeDown 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    .header-left {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
    }

    .header-eyebrow {
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--ink-4);
        padding: 3px 8px;
        background: var(--border-soft);
        border-radius: 100px;
        border: 1px solid var(--border);
    }

    .page-header h2 {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.025em;
        line-height: 1.1;
    }

    .page-header h2 em {
        font-style: italic;
        color: var(--accent);
    }

    /* ── ADD BUTTON ── */
    .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0.55rem 1.25rem;
        background: var(--ink);
        color: #fff;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 100px;
        letter-spacing: 0.01em;
        transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
        box-shadow: var(--shadow-sm);
        white-space: nowrap;
    }

    .btn-add:hover {
        background: var(--ink-2);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .btn-add:active { transform: scale(0.97); }

    .btn-add-icon {
        width: 18px; height: 18px;
        background: rgba(255,255,255,0.15);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        line-height: 1;
        font-style: normal;
    }

    /* ── TABLE CARD ── */
    .table-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }

    /* ── TOOLBAR: count + search in one row ── */
    .table-toolbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.875rem 1.25rem;
        border-bottom: 1px solid var(--border-soft);
        background: var(--surface-2);
    }

    .table-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
    }

    .table-meta-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--ink-3);
        white-space: nowrap;
    }

    .count-badge {
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--ink-3);
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: 100px;
        letter-spacing: 0.04em;
        white-space: nowrap;
    }

    /* ── SEARCH ── */
    .search-wrap {
        flex: 1;
        position: relative;
        max-width: 420px;
        margin-left: auto;
    }

    .search-wrap svg {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        width: 15px;
        height: 15px;
        color: var(--ink-4);
        pointer-events: none;
        flex-shrink: 0;
    }

    #serviceSearch {
        width: 100%;
        padding: 0.5rem 0.75rem 0.5rem 2.1rem;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.8rem;
        color: var(--ink);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
    }

    #serviceSearch::placeholder { color: var(--ink-4); }

    #serviceSearch:focus {
        border-color: var(--ink-3);
        box-shadow: 0 0 0 3px rgba(26,23,20,0.07);
    }

    /* ── TABLE ── */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead th {
        padding: 0.65rem 1rem;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ink-4);
        background: var(--surface-2);
        border-bottom: 1px solid var(--border-soft);
        text-align: left;
    }

    tbody tr {
        transition: background 0.14s, opacity 0.3s ease, transform 0.3s ease;
        opacity: 0;
        transform: translateY(6px);
    }

    tbody tr.visible {
        opacity: 1;
        transform: translateY(0);
    }

    tbody tr:hover { background: #faf7f3; }

    tbody td {
        padding: 0.85rem 1rem;
        font-size: 0.85rem;
        color: var(--ink-2);
        border-bottom: 1px solid var(--border-soft);
        vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    .td-name {
        font-weight: 600;
        color: var(--ink);
        font-size: 0.875rem;
    }

    .td-price {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 1rem;
        font-weight: 600;
        color: var(--green);
        letter-spacing: -0.02em;
        white-space: nowrap;
    }

    .td-price .currency {
        font-size: 0.7rem;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 500;
        opacity: 0.6;
        margin-right: 1px;
    }

    .td-desc {
        color: var(--ink-3);
        font-size: 0.8rem;
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* ── ACTIONS ── */
    .td-actions {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 0.35rem 0.8rem;
        border-radius: 7px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.72rem;
        font-weight: 600;
        text-decoration: none;
        border: 1.5px solid transparent;
        cursor: pointer;
        transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
        letter-spacing: 0.01em;
        background: none;
        white-space: nowrap;
    }

    .btn-edit {
        color: var(--blue);
        background: var(--blue-soft);
        border-color: #bfdbfe;
    }

    .btn-edit:hover {
        background: #dbeafe;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(29,78,216,0.15);
    }

    .btn-delete {
        color: var(--red);
        background: var(--red-soft);
        border-color: #fecaca;
    }

    .btn-delete:hover {
        background: #fee2e2;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(185,28,28,0.15);
    }

    .btn-edit:active,
    .btn-delete:active { transform: scale(0.96); }

    /* ── EMPTY STATE ── */
    .empty-state {
        text-align: center;
        padding: 3.5rem 2rem;
    }

    .empty-icon {
        font-size: 2rem;
        margin-bottom: 0.6rem;
        display: block;
        opacity: 0.35;
    }

    .empty-state p {
        font-size: 0.85rem;
        color: var(--ink-4);
    }

    /* ── PAGINATION ── */
    .pagination-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1.25rem;
        border-top: 1px solid var(--border-soft);
        background: var(--surface-2);
    }

    .pagination-info {
        font-size: 0.75rem;
        color: var(--ink-4);
        font-weight: 500;
    }

    .pagination-controls {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .pg-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 0.38rem 0.85rem;
        border-radius: 7px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        border: 1.5px solid var(--border);
        background: var(--surface);
        color: var(--ink-2);
        cursor: pointer;
        transition: all 0.17s ease;
        letter-spacing: 0.01em;
    }

    .pg-btn:hover:not(:disabled) {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
    }

    .pg-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
    }

    .pg-label {
        padding: 0.38rem 0.9rem;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--ink-3);
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: 7px;
        letter-spacing: 0.03em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="page-wrap">

    <!-- Header -->
    <div class="page-header">
        <div class="header-left">
            <span class="header-eyebrow">Manage</span>
            <h2>All <em>Services</em></h2>
        </div>
        <a href="{% url 'add_service' %}" class="btn-add">
            <i class="btn-add-icon">+</i>
            Add Service
        </a>
    </div>

    <!-- Table Card -->
    <div class="table-card">

        <!-- Toolbar: meta + search in one line -->
        <div class="table-toolbar">
            <div class="table-meta">
                <span class="table-meta-label">Services</span>
                <span class="count-badge" id="serviceCount">—</span>
            </div>
            <div class="search-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="serviceSearch" placeholder="Search by service name...">
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width:88px">Image</th>
                    <th style="width:18%">Service</th>
                    <th>Description</th>
                    <th style="width:110px">Price</th>
                    <th style="width:150px">Actions</th>
                </tr>
            </thead>
            <tbody id="serviceTableBody"></tbody>
        </table>

        <!-- Pagination Bar -->
        <div class="pagination-bar" id="paginationContainer" style="display:none;"></div>

    </div>
</div>

<script>
let currentPage = 1;

function renderRowsWithAnimation(html) {
    const tbody = document.getElementById('serviceTableBody');
    tbody.innerHTML = html;
    tbody.querySelectorAll('tr').forEach((row, i) => {
        setTimeout(() => row.classList.add('visible'), 40 + i * 30);
    });
}

function loadServices(page = 1) {
    const search = document.getElementById('serviceSearch').value || '';

    fetch(`/api/services/?page=${page}&search=${encodeURIComponent(search)}`)
        .then(r => r.json())
        .then(data => {
            currentPage = data.current_page;
            document.getElementById('serviceCount').innerText = data.total_count;

            let html = '';
            if (!data.results.length) {
                html = `<tr class="visible"><td colspan="5"><div class="empty-state"><span class="empty-icon">📦</span><p>No services found.</p></div></td></tr>`;
            } else {
                data.results.forEach(s => {
                    const imgHtml = s.image
                        ? `<img src="${s.image}" style="width:72px;height:50px;object-fit:cover;border-radius:7px;border:1px solid var(--border);">`
                        : `<div style="width:72px;height:50px;background:#f7f7f7;border-radius:7px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-4);font-size:11px;">No img</div>`;

                    html += `
                    <tr>
                        <td style="width:88px">${imgHtml}</td>
                        <td class="td-name">${escapeHtml(s.service_name)}</td>
                        <td><div class="td-desc">${escapeHtml(s.description)}</div></td>
                        <td class="td-price"><span class="currency">₹</span>${s.rate}</td>
                        <td>
                            <div class="td-actions">
                                <a href="/edit-service/${s.id}/" class="action-btn btn-edit">✎ Edit</a>
                                <button class="action-btn btn-delete" onclick="if(confirm('Delete this service?')) deleteService(${s.id})">✕ Delete</button>
                            </div>
                        </td>
                    </tr>`;
                });
            }

            renderRowsWithAnimation(html);
            renderPagination(data);
        })
        .catch(e => console.error(e));
}

function deleteService(id) {
    fetch(`/delete-service/${id}/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': getCookie('csrftoken'), 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(r => r.json())
    .then(res => { if (res.status === 'success') loadServices(currentPage); });
}

function renderPagination(data) {
    const container = document.getElementById('paginationContainer');
    if (data.total_pages <= 1) { container.style.display = 'none'; return; }

    container.style.display = 'flex';

    const totalCount = data.total_count || 0;
    const pageSize = 25;
    const start = (data.current_page - 1) * pageSize + 1;
    const end   = Math.min(data.current_page * pageSize, totalCount);

    container.innerHTML = `
        <span class="pagination-info">Showing ${start}–${end} of ${totalCount}</span>
        <div class="pagination-controls">
            <button class="pg-btn" onclick="loadServices(${data.current_page - 1})" ${!data.has_previous ? 'disabled' : ''}>
                ← Previous
            </button>
            <span class="pg-label">Page ${data.current_page} / ${data.total_pages}</span>
            <button class="pg-btn" onclick="loadServices(${data.current_page + 1})" ${!data.has_next ? 'disabled' : ''}>
                Next →
            </button>
        </div>`;
}

window.escapeHtml = function(str) {
    if (!str) return '';
    return String(str).replace(/[&"'<>]/g, s => ({'&':'&amp;','"':'&quot;',"'":'&#39;','<':'&lt;','>':'&gt;'})[s]);
};

window.getCookie = function(name) {
    const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : '';
};

let typingTimer;
document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('serviceSearch').addEventListener('keyup', function () {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => loadServices(1), 300);
    });
    loadServices();
});
</script>

{% endblock %}
