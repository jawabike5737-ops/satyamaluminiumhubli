{% extends 'base.html' %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

    :root {
        --bg:           #f7f5f0;
        --surface:      #ffffff;
        --surface-2:    #faf9f6;
        --border:       #e9e4db;
        --border-soft:  #f0ece5;
        --ink:          #1a1714;
        --ink-2:        #3d3830;
        --ink-3:        #7c7468;
        --ink-4:        #b0a89e;
        --accent:       #c2410c;
        --accent-soft:  #fff4ef;
        --green:        #15803d;
        --green-soft:   #f0fdf4;
        --blue:         #1d4ed8;
        --blue-soft:    #eff6ff;
        --red:          #b91c1c;
        --red-soft:     #fef2f2;
        --shadow-sm:    0 1px 2px rgba(0,0,0,0.05);
        --shadow-md:    0 4px 16px rgba(0,0,0,0.07);
        --shadow-lg:    0 8px 32px rgba(0,0,0,0.1);
        --r:            12px;
        --r-lg:         16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
    }

    /* grain texture */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
    }

    /* ── WRAPPER ── */
    .page-wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 2.5rem 1.75rem 4rem;
    }

    /* ── HEADER ── */
    .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 2rem;
        animation: fadeDown 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    .header-eyebrow {
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--ink-4);
        margin-bottom: 0.3rem;
    }

    .page-header h2 {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 2rem;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.025em;
        line-height: 1.1;
    }

    .page-header h2 em {
        font-style: italic;
        color: var(--accent);
    }

    /* ── ADD BUTTON ── */
    .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0.55rem 1.1rem;
        background: var(--ink);
        color: #fff;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 100px;
        letter-spacing: 0.01em;
        transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
        box-shadow: var(--shadow-sm);
        white-space: nowrap;
    }

    .btn-add:hover {
        background: var(--ink-2);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .btn-add:active { transform: scale(0.97); }

    .btn-add-icon {
        width: 18px; height: 18px;
        background: rgba(255,255,255,0.15);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        line-height: 1;
        font-style: normal;
    }

    /* ── TABLE CARD ── */
    .table-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }

    .table-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border-soft);
        background: var(--surface-2);
    }

    .table-meta {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .table-meta-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--ink-3);
    }

    .count-badge {
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--ink-3);
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: 100px;
        letter-spacing: 0.04em;
    }

    /* ── TABLE ── */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead th {
        padding: 0.7rem 1.5rem;
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ink-4);
        background: var(--surface-2);
        border-bottom: 1px solid var(--border-soft);
        text-align: left;
    }

    tbody tr {
        transition: background 0.14s;
    }

    tbody tr:hover {
        background: #faf7f3;
    }

    tbody td {
        padding: 1rem 1.5rem;
        font-size: 0.875rem;
        color: var(--ink-2);
        border-bottom: 1px solid var(--border-soft);
        font-weight: 400;
        vertical-align: middle;
    }

    tbody tr:last-child td {
        border-bottom: none;
    }

    /* service name */
    .td-name {
        font-weight: 500;
        color: var(--ink);
        font-size: 0.9rem;
    }

    /* price cell */
    .td-price {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--green);
        letter-spacing: -0.02em;
    }

    .td-price .currency {
        font-size: 0.72rem;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 500;
        opacity: 0.6;
        margin-right: 1px;
    }

    /* actions */
    .td-actions {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 0.38rem 0.85rem;
        border-radius: 8px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        text-decoration: none;
        border: 1.5px solid transparent;
        cursor: pointer;
        transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
        letter-spacing: 0.01em;
        background: none;
    }

    .btn-edit {
        color: var(--blue);
        background: var(--blue-soft);
        border-color: #bfdbfe;
    }

    .btn-edit:hover {
        background: #dbeafe;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(29,78,216,0.15);
    }

    .btn-delete {
        color: var(--red);
        background: var(--red-soft);
        border-color: #fecaca;
    }

    .btn-delete:hover {
        background: #fee2e2;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(185,28,28,0.15);
    }

    .btn-edit:active,
    .btn-delete:active {
        transform: scale(0.96);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--ink-4);
    }

    .empty-icon {
        font-size: 2rem;
        margin-bottom: 0.75rem;
        display: block;
        opacity: 0.4;
    }

    .empty-state p {
        font-size: 0.875rem;
        color: var(--ink-4);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* row stagger via JS */
    tbody tr {
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 0.3s ease, transform 0.3s ease, background 0.14s;
    }

    tbody tr.visible {
        opacity: 1;
        transform: translateY(0);
    }
</style>

<div class="page-wrap">

    <!-- Header -->
    <div class="page-header">
        <div class="header-left">
            <div class="header-eyebrow">Manage</div>
            <h2>All <em>Services</em></h2>
        </div>
        <a href="{% url 'add_service' %}" class="btn-add">
            <i class="btn-add-icon">+</i>
            Add Service
        </a>
    </div>

    <!-- Table Card -->
    <div class="table-card">
        <div class="table-card-header">
            <div class="table-meta">
                <span class="table-meta-label">Services</span>
                <span class="count-badge">{{ data|length }} total</span>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Service Name</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for s in data %}
                <tr id="service-{{ s.id }}">
                    <td class="td-name">{{ s.name }}</td>
                    <td class="td-price">
                        <span class="currency">₹</span>{{ s.price }}
                    </td>
                    <td>
                        <div class="td-actions">
                            <a href="{% url 'edit_service' s.id %}" class="action-btn btn-edit">
                                ✎ Edit
                            </a>
                            <button
                                data-delete-url="{% url 'delete_service' s.id %}"
                                data-remove-on-success="#service-{{ s.id }}"
                                class="action-btn btn-delete"
                                onclick="return confirm('Are you sure you want to delete this service?')"
                            >
                                ✕ Delete
                            </button>
                        </div>
                    </td>
                </tr>
                {% empty %}
                <tr class="visible">
                    <td colspan="3">
                        <div class="empty-state">
                            <span class="empty-icon">◎</span>
                            <p>No services added yet.</p>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const rows = document.querySelectorAll('tbody tr');
        rows.forEach((row, i) => {
            setTimeout(() => row.classList.add('visible'), 60 + i * 45);
        });
    });
</script>

{% endblock %}
