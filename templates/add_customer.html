{% extends 'base.html' %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap');

    /* ===== PAGE WRAPPER ===== */
    .cu-wrap {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1.5rem;
        font-family: 'DM Sans', sans-serif;
        background-color: #f5f0e8;
        background-image:
            linear-gradient(90deg, rgba(180, 160, 120, 0.08) 1px, transparent 1px),
            linear-gradient(rgba(180, 160, 120, 0.08) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    /* ===== CARD ===== */
    .cu-card {
        width: 100%;
        max-width: 850px;
        background: #fffdf7;
        border: 1.5px solid #e2d9c8;
        border-radius: 16px;
        overflow: hidden;
        box-shadow:
            0 4px 6px -1px rgba(120, 100, 60, 0.07),
            0 10px 30px -5px rgba(120, 100, 60, 0.10);
    }

    /* ===== HEADER ===== */
    .cu-header {
        padding: 32px 40px 26px;
        border-bottom: 1.5px solid #e8e0d0;
        background: linear-gradient(180deg, #fffdf7 0%, #faf6ee 100%);
        display: flex;
        align-items: flex-start;
        gap: 18px;
    }

    .cu-header-icon {
        width: 50px;
        height: 50px;
        background: #3d3422;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 2px;
    }

    .cu-header-icon svg {
        width: 24px;
        height: 24px;
        stroke: #f5f0e8;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .cu-header-text { flex: 1; }

    .cu-title {
        margin: 0 0 5px 0;
        font-family: 'Playfair Display', serif;
        font-size: 1.65rem;
        font-weight: 700;
        color: #1e1a0f;
        letter-spacing: -0.01em;
        line-height: 1.2;
    }

    .cu-subtitle {
        margin: 0;
        font-size: 0.875rem;
        color: #8a7d65;
        font-weight: 400;
    }

    /* ===== BODY ===== */
    .cu-body { padding: 30px 40px 32px; }

    /* ===== ERROR ===== */
    .cu-error {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fef2f2;
        border: 1.5px solid #fecaca;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 22px;
        font-size: 0.875rem;
        color: #b91c1c;
        font-weight: 500;
    }

    .cu-error svg {
        width: 16px;
        height: 16px;
        stroke: #ef4444;
        fill: none;
        stroke-width: 1.8;
        flex-shrink: 0;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    /* ===== FORM GRID ===== */
    .cu-form { margin: 0; padding: 0; }

    .cu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px 28px;
    }

    .cu-field-full { grid-column: 1 / -1; }

    /* ===== FIELD ===== */
    .cu-field { display: flex; flex-direction: column; gap: 7px; }

    .cu-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: #5a4f3a;
        letter-spacing: 0.07em;
        text-transform: uppercase;
    }

    .cu-label .opt {
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
        font-size: 0.72rem;
        color: #a99880;
    }

    .cu-input-wrap { position: relative; }

    .cu-icon {
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        display: flex;
        z-index: 2;
    }

    .cu-icon.top { top: 14px; transform: none; }

    .cu-icon svg {
        width: 16px;
        height: 16px;
        stroke: #b5a68a;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.2s ease;
    }

    .cu-field:focus-within .cu-icon svg { stroke: #7a6840; }

    .cu-form input[type="text"],
    .cu-form textarea {
        width: 100%;
        padding: 11px 14px 11px 42px;
        border-radius: 10px;
        border: 1.5px solid #ddd5c0;
        background: #faf8f3;
        color: #1e1a0f;
        font-size: 0.93rem;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        outline: none;
        transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        box-sizing: border-box;
        -webkit-appearance: none;
    }

    .cu-form textarea {
        height: 96px;
        resize: none;
        padding-top: 12px;
        line-height: 1.55;
    }

    .cu-form input[type="text"]::placeholder,
    .cu-form textarea::placeholder {
        color: #c4b89a;
        font-weight: 400;
    }

    .cu-form input[type="text"]:focus,
    .cu-form textarea:focus {
        border-color: #7a6840;
        background: #fffdf7;
        box-shadow: 0 0 0 3px rgba(122, 104, 64, 0.12);
    }

    .cu-char {
        position: absolute;
        bottom: 9px;
        right: 12px;
        font-size: 0.7rem;
        color: #b5a68a;
        pointer-events: none;
        font-weight: 600;
        transition: color 0.2s ease;
    }

    /* ===== ACTIONS ===== */
    .cu-actions {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 10px;
        padding-top: 26px;
        border-top: 1.5px solid #e8e0d0;
    }

    .cu-btn-cancel {
        padding: 11px 24px;
        border-radius: 10px;
        border: 1.5px solid #ddd5c0;
        background: transparent;
        color: #5a4f3a;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
    }

    .cu-btn-cancel:hover {
        background: #f0ebe0;
        border-color: #c9bda4;
    }

    .cu-btn-save {
        padding: 11px 30px;
        border-radius: 10px;
        border: none;
        background: #3d3422;
        color: #f5f0e8;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .cu-btn-save svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .cu-btn-save:hover {
        background: #2a2415;
        box-shadow: 0 4px 14px rgba(61, 52, 34, 0.3);
        transform: translateY(-1px);
    }

    .cu-btn-save:active {
        transform: translateY(0);
        box-shadow: none;
    }

    /* ===== FOOTER ===== */
    .cu-footer {
        padding: 14px 40px 16px;
        border-top: 1.5px solid #e8e0d0;
        background: #fcf8f2;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .cu-footer-info {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: #8a7d65;
        font-weight: 500;
    }

    .cu-footer-info svg {
        width: 13px;
        height: 13px;
        stroke: #9c6c2d;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .cu-footer-note {
        font-size: 0.78rem;
        color: #7b6c5e;
        font-weight: 600;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 680px) {
        .cu-header { padding: 24px; flex-wrap: wrap; }
        .cu-body { padding: 24px; }
        .cu-grid { grid-template-columns: 1fr; }
        .cu-field-full { grid-column: 1; }
        .cu-actions { flex-direction: column-reverse; }
        .cu-btn-cancel, .cu-btn-save { width: 100%; justify-content: center; }
        .cu-footer { padding: 14px 24px; }
    }
</style>

<div class="cu-wrap">
    <div class="cu-card">

        <!-- Header -->
        <div class="cu-header">
            <div class="cu-header-icon">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            </div>
            <div class="cu-header-text">
                <h2 class="cu-title">Add Customer</h2>
                <p class="cu-subtitle">Fill in the details to register a new customer</p>
            </div>
        </div>

        <!-- Body -->
        <div class="cu-body">

            {% if error %}
            <div class="cu-error" role="alert">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="ajax-form cu-form" data-reset-on-success="true">
                {% csrf_token %}

                <div class="cu-grid">

                    <!-- Name -->
                    <div class="cu-field">
                        <label class="cu-label" for="cu-name">Customer Name</label>
                        <div class="cu-input-wrap">
                            <span class="cu-icon">
                                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </span>
                            <input type="text" id="cu-name" name="name" placeholder="e.g. Sanjay Singh Rajpurohit" required autocomplete="name">
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="cu-field">
                        <label class="cu-label" for="cu-phone">Phone Number</label>
                        <div class="cu-input-wrap">
                            <span class="cu-icon">
                                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 10a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3 1.17h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8a16 16 0 0 0 6 6l1.17-1.17a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 15l-.08 1.92z"/></svg>
                            </span>
                            <input type="text" id="cu-phone" name="phone" placeholder="e.g. +91 98765 43210" required autocomplete="tel">
                        </div>
                    </div>

                    <!-- Address -->
                    <div class="cu-field cu-field-full">
                        <label class="cu-label" for="cu-address">Address <span class="opt">(optional)</span></label>
                        <div class="cu-input-wrap">
                            <span class="cu-icon top">
                                <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            </span>
                            <textarea id="cu-address" name="address" placeholder="Street, City, State..." maxlength="200"></textarea>
                            <span class="cu-char" id="cu-char-count" aria-live="polite">0 / 200</span>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="cu-actions">
                        <a href="javascript:history.back()" class="cu-btn-cancel">Cancel</a>
                        <button type="submit" class="cu-btn-save">
                            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><polyline points="16 11 18 13 22 9"/><circle cx="12" cy="7" r="4"/></svg>
                            Add Customer
                        </button>
                    </div>

                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="cu-footer">
            <div class="cu-footer-info">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Secure &amp; encrypted
            </div>
            <div class="cu-footer-note">* Required fields</div>
        </div>

    </div>
</div>

<script>
(function () {
    var textarea  = document.getElementById('cu-address');
    var charCount = document.getElementById('cu-char-count');
    if (textarea && charCount) {
        textarea.addEventListener('input', function () {
            var len = textarea.value.length;
            charCount.textContent = len + ' / 200';
            charCount.style.color = len > 170 ? '#b91c1c' : '#b5a68a';
        });
    }
})();
</script>

{% endblock %}
