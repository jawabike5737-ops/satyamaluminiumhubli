<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert Order</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #1a1a2e;
            --ink-soft: #4a4a6a;
            --ink-ghost: #9090b0;
            --surface: #ffffff;
            --surface-2: #f7f5ff;
            --surface-3: #eeeaff;
            --accent: #5b3de8;
            --accent-2: #8b6bff;
            --accent-glow: rgba(91, 61, 232, 0.18);
            --gold: #c9a84c;
            --gold-light: #f0d98a;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 20px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0e0c1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }

        /* Animated background orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #5b3de8, transparent 70%);
            top: -100px; left: -100px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #c9a84c, transparent 70%);
            bottom: -80px; right: -80px;
            animation-delay: -6s;
            animation-duration: 15s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.08); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--accent-2);
            border-radius: 50%;
            opacity: 0;
            animation: float-up var(--dur, 8s) var(--delay, 0s) ease-in infinite;
        }
        @keyframes float-up {
            0%   { opacity: 0; transform: translateY(0) scale(0); }
            10%  { opacity: 0.6; transform: translateY(-30px) scale(1); }
            90%  { opacity: 0.2; }
            100% { opacity: 0; transform: translateY(-220px) scale(0.3); }
        }

        /* Card */
        .card {
            position: relative;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius);
            padding: 48px 44px 44px;
            width: 100%;
            max-width: 440px;
            animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            box-shadow:
                0 0 0 1px rgba(91,61,232,0.15),
                0 24px 64px rgba(0,0,0,0.5),
                0 0 120px rgba(91,61,232,0.08) inset;
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top decorative line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-2), var(--gold), var(--accent-2), transparent);
            border-radius: 0 0 4px 4px;
            animation: shimmer-line 3s ease-in-out infinite;
        }
        @keyframes shimmer-line {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Icon badge */
        .icon-badge {
            width: 64px; height: 64px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, rgba(91,61,232,0.3), rgba(139,107,255,0.2));
            border: 1px solid rgba(139,107,255,0.35);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            animation: badge-in 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) both;
            position: relative;
        }
        .icon-badge::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(91,61,232,0.5), transparent, rgba(201,168,76,0.3));
            z-index: -1;
            opacity: 0;
            animation: badge-glow 2.5s 1s ease-in-out infinite alternate;
        }
        @keyframes badge-glow { to { opacity: 1; } }
        @keyframes badge-in {
            from { opacity: 0; transform: scale(0.6) rotate(-10deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .icon-badge svg { width: 28px; height: 28px; }

        /* Heading */
        h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            font-weight: 400;
            color: #f0eeff;
            text-align: center;
            letter-spacing: -0.3px;
            animation: fade-up 0.7s 0.3s both;
        }
        .subtitle {
            font-size: 13.5px;
            color: rgba(255,255,255,0.45);
            text-align: center;
            margin-top: 6px;
            letter-spacing: 0.2px;
            animation: fade-up 0.7s 0.35s both;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 28px 0;
            animation: fade-up 0.6s 0.4s both;
        }

        /* Total display */
        .total-block {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            margin-bottom: 20px;
            animation: fade-up 0.7s 0.45s both;
            position: relative;
            overflow: hidden;
        }
        .total-block::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--gold), var(--gold-light));
            border-radius: 3px 0 0 3px;
        }
        .total-label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }
        .total-value {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            color: var(--gold-light);
            letter-spacing: -0.5px;
        }
        .currency-tag {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--gold);
            margin-right: 3px;
            font-weight: 500;
        }

        /* Error alert */
        .error-alert {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 20px;
            animation: shake 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both, fade-up 0.4s both;
        }
        .error-alert svg { flex-shrink: 0; }
        .error-alert span { font-size: 13.5px; color: #fca5a5; line-height: 1.45; }
        @keyframes shake {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }

        /* Form */
        .form-group {
            animation: fade-up 0.7s 0.5s both;
            position: relative;
        }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 10px;
        }
        .input-wrap {
            position: relative;
        }
        .input-prefix {
            position: absolute;
            left: 16px;
            top: 50%; transform: translateY(-50%);
            font-size: 16px;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            pointer-events: none;
            transition: color 0.25s;
            z-index: 1;
        }
        input[type="number"] {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            padding: 15px 16px 15px 36px;
            font-family: 'DM Sans', sans-serif;
            font-size: 20px;
            font-weight: 300;
            color: #f0eeff;
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
            -moz-appearance: textfield;
            appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type="number"]::placeholder { color: rgba(255,255,255,0.2); font-size: 16px; }
        input[type="number"]:focus {
            border-color: rgba(139,107,255,0.6);
            background: rgba(91,61,232,0.1);
            box-shadow: 0 0 0 4px rgba(91,61,232,0.15);
        }
        input[type="number"]:focus ~ .focus-line { transform: scaleX(1); }
        input[type="number"]:focus + .input-prefix-el { color: var(--accent-2); }

        /* Balance indicator */
        .balance-bar {
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            margin-top: 14px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .balance-bar.visible { opacity: 1; }
        .balance-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-2), var(--gold));
            border-radius: 99px;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s;
        }
        .balance-fill.over { background: linear-gradient(90deg, var(--danger), #ff8080); }
        .balance-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .balance-info.visible { opacity: 1; }
        .balance-remaining { color: rgba(255,255,255,0.5); font-weight: 500; }
        .balance-remaining.over { color: #fca5a5; }

        /* Submit button */
        .btn-submit {
            width: 100%;
            margin-top: 28px;
            padding: 17px 20px;
            background: linear-gradient(135deg, var(--accent), #7c55f5);
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fade-up 0.7s 0.55s both;
            letter-spacing: 0.3px;
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s, opacity 0.6s;
            opacity: 0;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(91,61,232,0.45), 0 0 0 1px rgba(139,107,255,0.3);
        }
        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:active { transform: translateY(0) scale(0.98); }
        .btn-submit:active::after { width: 300px; height: 300px; opacity: 0; }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }
        .btn-content svg { transition: transform 0.3s; }
        .btn-submit:hover .btn-content svg { transform: translateX(3px); }

        /* Loading state */
        .btn-submit.loading .btn-content { opacity: 0; }
        .btn-submit.loading::before { opacity: 1; }
        .spinner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-submit.loading .spinner { display: block; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Footer note */
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-top: 24px;
            animation: fade-up 0.7s 0.65s both;
            letter-spacing: 0.1px;
        }
        .footer-note a { color: rgba(139,107,255,0.6); text-decoration: none; }

        /* Inline toast */
        .inline-toast {
            position: absolute;
            bottom: -52px;
            left: 50%; transform: translateX(-50%);
            background: rgba(239,68,68,0.9);
            backdrop-filter: blur(12px);
            color: #fff;
            font-size: 13px;
            padding: 9px 18px;
            border-radius: 99px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            transform: translateX(-50%) translateY(4px);
        }
        .inline-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="card">
    <!-- Icon -->
    <div class="icon-badge">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 3L25 8V14C25 19.5 21 24.7 14 26C7 24.7 3 19.5 3 14V8L14 3Z" stroke="rgba(139,107,255,0.7)" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 14L12.5 17.5L19 11" stroke="#8b6bff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <h2>Confirm Order</h2>
    <p class="subtitle">Enter advance payment to finalise this order</p>

    <div class="divider"></div>

    <!-- Total block -->
    <div class="total-block">
        <span class="total-label">Order Total</span>
        <span class="total-value"><span class="currency-tag">₹</span>{{ q.total }}</span>
    </div>

    <!-- Error message -->
    {% if error %}
    <div class="error-alert">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="#f87171" stroke-width="1.2"/>
            <path d="M8 5v4M8 11v.5" stroke="#f87171" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Form -->
    <form id="convertForm" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label" for="advanceInput">Advance Amount</label>
            <div class="input-wrap">
                <span class="input-prefix">₹</span>
                <input
                    type="number"
                    step="0.01"
                    min="0"
                    id="advanceInput"
                    name="advance"
                    placeholder="0.00"
                    required
                    autocomplete="off"
                >
            </div>
            <div class="balance-bar" id="balanceBar">
                <div class="balance-fill" id="balanceFill"></div>
            </div>
            <div class="balance-info" id="balanceInfo">
                <span>Advance</span>
                <span class="balance-remaining" id="balanceRemaining">Balance due: —</span>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
            <span class="spinner"></span>
            <span class="btn-content">
                Confirm &amp; Generate Order
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </button>
    </form>

    <p class="footer-note">A PDF receipt will be generated upon confirmation</p>

    <div class="inline-toast" id="inlineToast"></div>
</div>

<script>
(function () {
    // Particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText = `left:${Math.random()*100}%;top:${50+Math.random()*50}%;--dur:${6+Math.random()*8}s;--delay:${Math.random()*10}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;opacity:${0.3+Math.random()*0.4}`;
        pc.appendChild(p);
    }

    const form   = document.getElementById('convertForm');
    const adv    = document.getElementById('advanceInput');
    const bar    = document.getElementById('balanceBar');
    const fill   = document.getElementById('balanceFill');
    const info   = document.getElementById('balanceInfo');
    const rem    = document.getElementById('balanceRemaining');
    const btn    = document.getElementById('submitBtn');
    const toast  = document.getElementById('inlineToast');
    const total  = parseFloat('{{ q.total }}') || 0;

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => toast.classList.remove('show'), 2800);
    }

    adv.addEventListener('input', function () {
        const val = parseFloat(this.value || '0');
        if (isNaN(val) || total <= 0) { bar.classList.remove('visible'); info.classList.remove('visible'); return; }
        const pct = Math.min((val / total) * 100, 100);
        fill.style.width = pct + '%';
        const over = val > total;
        fill.classList.toggle('over', over);
        rem.classList.toggle('over', over);
        rem.textContent = over
            ? 'Exceeds total by ₹' + (val - total).toFixed(2)
            : 'Balance due: ₹' + (total - val).toFixed(2);
        bar.classList.add('visible');
        info.classList.add('visible');
    });

    form.addEventListener('submit', function (e) {
        const val = parseFloat(adv.value || '0');
        if (isNaN(val) || val < 0) {
            e.preventDefault();
            showToast('Please enter a valid advance amount');
            adv.focus();
            return;
        }
        if (val > total) {
            e.preventDefault();
            showToast('Advance cannot exceed the total amount');
            adv.focus();
            return;
        }
        btn.classList.add('loading');
        btn.disabled = true;
    });
})();
</script>
</body>
</html>
