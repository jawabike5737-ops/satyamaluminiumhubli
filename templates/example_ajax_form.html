{% extends 'base.html' %}

{% block content %}
<div style="max-width:720px;margin:20px auto">
  <div style="background:#fff;padding:18px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
    <h3 style="margin-top:0">Add Customer (AJAX)</h3>

    <form method="post" action="{% url 'add_customer' %}" class="ajax-form" data-reset-on-success="true">
      {% csrf_token %}
      <div style="display:flex;gap:8px">
        <input name="name" placeholder="Customer name" required style="flex:1;padding:8px;border:1px solid #e0e0e0;border-radius:6px">
        <input name="phone" placeholder="Phone" required style="width:160px;padding:8px;border:1px solid #e0e0e0;border-radius:6px">
      </div>
      <div style="margin-top:10px">
        <input name="address" placeholder="Address" style="width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:6px">
      </div>

      <div style="margin-top:12px;text-align:right">
        <button type="submit" class="btn">Save Customer</button>
      </div>
    </form>

    <div style="margin-top:18px">
      <h4>Customers (demo)</h4>
      <ul id="customer-list">
        {% for c in customers %}
          <li id="cust-{{ c.id }}">{{ c.name }} — {{ c.phone }}</li>
        {% empty %}
          <li class="no-data">No customers yet</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
