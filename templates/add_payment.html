{% extends 'base.html' %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #4f46e5;
        --primary-glow: rgba(79, 70, 229, 0.4);
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        --card-bg: #ffffff;
        --text-dark: #1e293b;
        --text-light: #64748b;
        --danger: #ef4444;
        --success: #10b981;
    }

    body {
        background: var(--bg-gradient);
        font-family: 'Plus Jakarta Sans', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
    }

    /* ✨ Main Container Animation */
    .payment-container {
        width: 100%;
        max-width: 440px;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.7);
        position: relative;
        overflow: hidden;
        animation: cardAppear 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardAppear {
        0% { opacity: 0; transform: scale(0.9) translateY(20px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* 🏷️ Header */
    .payment-container h2 {
        font-size: 24px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 30px;
        color: var(--text-dark);
        letter-spacing: -0.5px;
    }

    /* 📦 Info Cards */
    .info-grid {
        display: grid;
        gap: 12px;
        margin-bottom: 25px;
    }

    .info-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 18px;
        border-radius: 14px;
        background: #f8fafc;
        border: 1px solid #f1f5f9;
        transition: 0.3s;
    }

    .info-item:hover {
        background: #f1f5f9;
        transform: translateX(5px);
    }

    .info-label {
        font-size: 13px;
        color: var(--text-light);
        font-weight: 500;
    }

    .info-value {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-dark);
    }

    .info-item.remaining {
        background: rgba(239, 68, 68, 0.05);
        border: 1px solid rgba(239, 68, 68, 0.1);
    }

    .info-item.remaining .info-value {
        color: var(--danger);
    }

    /* ⌨️ Modern Input Styling */
    .form-group {
        position: relative;
        margin-top: 30px;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .currency-symbol {
        position: absolute;
        left: 16px;
        font-weight: 600;
        color: var(--text-light);
        font-size: 18px;
    }

    input[type="number"] {
        width: 100%;
        padding: 16px 16px 16px 40px;
        border-radius: 14px;
        border: 2px solid #e2e8f0;
        font-size: 18px;
        font-weight: 600;
        color: var(--text-dark);
        background: #fff;
        transition: all 0.3s ease;
        outline: none;
    }

    input[type="number"]::placeholder {
        color: #cbd5e1;
        font-weight: 400;
    }

    input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-glow);
    }

    /* 🚀 Action Button */
    button {
        width: 100%;
        margin-top: 25px;
        padding: 16px;
        border: none;
        border-radius: 14px;
        background: var(--primary);
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    button:hover {
        background: #4338ca;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
    }

    button:active {
        transform: scale(0.98);
    }

    /* ✨ Background Decoration */
    .circle-decoration {
        position: absolute;
        top: -50px;
        right: -50px;
        width: 150px;
        height: 150px;
        background: var(--primary-glow);
        filter: blur(60px);
        z-index: -1;
    }

</style>

<div class="payment-container">
    <div class="circle-decoration"></div>

    <h2>Add Payment</h2>

    <div class="info-grid">
        <div class="info-item">
            <span class="info-label">Customer</span>
            <span class="info-value">{{ order.customer.name }}</span>
        </div>

        <div class="info-item remaining">
            <span class="info-label">Outstanding Balance</span>
            <span class="info-value">₹ {{ order.remaining }}</span>
        </div>
    </div>

    <form method="POST" class="ajax-form" data-after-success="reload">
        {% csrf_token %}

        <div class="form-group">
            <div class="input-wrapper">
                <span class="currency-symbol">₹</span>
                <input 
                    type="number" 
                    name="amount" 
                    placeholder="0.00" 
                    step="0.01"
                    min="0"
                    max="{{ order.remaining }}"
                    required
                >
            </div>
        </div>

        <button type="submit">
            Confirm Payment
        </button>
    </form>
</div>

<script>
    const input = document.querySelector('input[name="amount"]');
    const max = Number('{{ order.remaining|default:"0" }}');
    
    input.addEventListener('input', (e) => {
        if (e.target.value > max) {
            e.target.style.borderColor = 'var(--danger)';
        } else {
            e.target.style.borderColor = 'var(--primary)';
        }
    });
</script>

{% endblock %}
