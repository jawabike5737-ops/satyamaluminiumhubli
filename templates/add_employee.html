{% extends 'base.html' %}

{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* page-level body styles removed - keep body controlled by base.html */

  /* Center page content within the main .content area (use in base) */
  .content {
    display: flex;
    justify-content: center;
    align-items: center; /* vertically center the card within content area */
    padding: 40px 16px; /* preserve spacing originally on body */
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    width: 100%;
    max-width: 420px;
    box-shadow:
      0 1px 2px rgba(0,0,0,0.04),
      0 4px 16px rgba(0,0,0,0.06),
      0 20px 48px rgba(0,0,0,0.08);
    overflow: hidden;
    animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 32px 36px 24px;
    border-bottom: 1px solid #f0ede8;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .icon-wrap {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #2c5282, #3182ce);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(49,130,206,0.28);
  }

  .icon-wrap svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .header-text h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    color: #1a202c;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .header-text p {
    margin-top: 3px;
    font-size: 13px;
    color: #718096;
    font-weight: 400;
  }

  .form-body {
    padding: 28px 36px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .field {
    position: relative;
    margin-bottom: 16px;
    animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  .field:nth-child(1) { animation-delay: 0.08s; }
  .field:nth-child(2) { animation-delay: 0.14s; }
  .field:nth-child(3) { animation-delay: 0.20s; }
  .field:nth-child(4) { animation-delay: 0.26s; }
  .field:nth-child(5) { animation-delay: 0.32s; }
  .field:nth-child(6) { animation-delay: 0.38s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .field label {
    display: block;
    font-size: 11.5px;
    font-weight: 600;
    color: #4a5568;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 6px;
  }

  .field .optional-tag {
    font-size: 10px;
    font-weight: 400;
    color: #a0aec0;
    text-transform: none;
    letter-spacing: 0;
    margin-left: 6px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #a0aec0;
    display: flex;
    align-items: center;
    pointer-events: none;
    transition: color 0.2s;
  }

  .input-wrap .input-icon svg {
    width: 15px;
    height: 15px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .input-wrap input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    background: #fafafa;
    color: #1a202c;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .input-wrap input::placeholder {
    color: #c0cad6;
  }

  .input-wrap input:focus {
    border-color: #3182ce;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(49,130,206,0.1);
  }

  .input-wrap input:focus + .input-icon,
  .input-wrap:focus-within .input-icon {
    color: #3182ce;
  }

  .divider {
    height: 1px;
    background: #f0ede8;
    margin: 4px 0 16px;
  }

  .form-footer {
    animation: fadeUp 0.5s 0.44s cubic-bezier(0.22,1,0.36,1) both;
  }

  .submit-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #2c5282, #3182ce);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(49,130,206,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(49,130,206,0.38);
  }

  .submit-btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(49,130,206,0.2);
  }

  /* GRID LAYOUT */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .form-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    background: #fafafa;
    color: #1a202c;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    outline: none;
  }

  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .card { max-width: 420px; }
  }

  /* Larger card + centered spacing */
  .card {
    max-width: 900px;
    margin: 48px auto;
  }

  .form-footer {
    display: flex;
    justify-content: center;
    margin-top: 18px;
  }

  .submit-btn {
    padding: 14px 18px;
    font-size: 15px;
    border-radius: 14px;
    min-width: 240px;
  }
</style>

<div class="card">
  <div class="card-header">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </div>
    <div class="header-text">
      <h2>Add Employee</h2>
      <p>Fill in the details to register a new team member</p>
    </div>
  </div>

  <form method="POST" class="form-body ajax-form" data-reset-on-success="true">

    <div class="form-grid">

      <!-- LEFT COLUMN -->
      <div class="form-col">
        <div class="field">
          <label>Employee Name</label>
          <input type="text" name="name" placeholder="e.g. Rahul Sharma" required>
        </div>

        <div class="field">
          <label>Phone</label>
          <input type="text" name="phone" placeholder="+91 98765 43210" required>
        </div>

        <div class="field">
          <label>Role</label>
          <input type="text" name="role" placeholder="Site Supervisor" required>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="form-col">
        <div class="field">
          <label>Daily Salary</label>
          <input type="number" step="0.01" name="salary" placeholder="0.00" required>
        </div>

        <div class="field">
          <label>Half Day Salary</label>
          <input type="number" step="0.01" name="half_salary" placeholder="0.00" required>
        </div>

        <div class="field">
          <label>Overtime Salary</label>
          <input type="number" step="0.01" name="overtime_salary" placeholder="0.00">
        </div>
      </div>

    </div>

    <div class="form-footer" style="margin-top:18px;">
      <button type="submit" class="submit-btn">Add Employee</button>
    </div>

  </form>
</div>

{% endblock %}
