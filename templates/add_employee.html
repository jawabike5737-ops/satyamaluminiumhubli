{% extends 'base.html' %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
:root {
    --cream: #faf8f4;
    --white: #ffffff;
    --surface: #f5f3ef;
    --surface-2: #faf9f6;
    --ink: #1a1714;
    --muted: #6b6560;
    --faint: #c4bfba;
    --accent: #c8602a;
    --accent-glow: rgba(200,96,42,0.12);
    --border: #e8e3de;
    --border-soft: #f0ece5;
    --radius: 10px;
    --radius-lg: 16px;
    --shadow-md: 0 4px 24px rgba(0,0,0,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--cream); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ── PAGE LAYOUT ── */
.page-wrapper {
    padding: 1.5rem 2rem 3rem;
}

/* ── PAGE HEADER ── */
.page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 980px;
    margin: 0 auto 1rem;
    animation: fadeDown 0.4s cubic-bezier(0.22,1,0.36,1) both;
}

.header-left {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
}

.eyebrow-pill {
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    padding: 3px 9px;
    background: var(--surface);
    border-radius: 100px;
    border: 1px solid var(--border);
}

.page-title {
    font-family: 'Fraunces', serif;
    font-size: 1.75rem;
    font-weight: 500;
    line-height: 1.15;
    color: var(--ink);
    letter-spacing: -0.025em;
}
.page-title em { color: var(--accent); font-style: italic; }

.btn-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0.48rem 1rem;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    transition: all 0.18s ease;
}
.btn-back:hover { border-color: var(--ink); color: var(--ink); }

/* ── CARD ── */
.card {
    width: 100%;
    max-width: 980px;
    margin: 0 auto;
    background: var(--white);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) 0.05s both;
}

.card-bar { height: 3px; background: var(--accent); }

.card-body {
    padding: 1.75rem 2rem 2rem;
}

.card-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.5rem;
}

/* ── FORM GRID ── */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem 2rem;
}

/* ── FIELD ── */
.field {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.field label {
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
}

.field label .opt {
    font-weight: 400;
    opacity: 0.65;
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
}

/* ── INPUT ── */
.field-wrap { position: relative; }

.field-prefix {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--muted);
    pointer-events: none;
    user-select: none;
    font-family: 'DM Sans', sans-serif;
}

.f-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.f-input::placeholder { color: #b5b0ab; }
.f-input:focus {
    border-color: var(--accent);
    background: var(--white);
    box-shadow: 0 0 0 3px var(--accent-glow);
}
.f-input.has-prefix { padding-left: 28px; }

/* ── SECTION DIVIDER ── */
.section-divider {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0.25rem 0;
}
.section-divider span {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--faint);
    white-space: nowrap;
}
.section-divider::before,
.section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-soft);
}
.section-divider::before { display: none; }

/* ── FOOTER ── */
.svc-divider { height: 1px; background: var(--border-soft); margin: 1.5rem 0 0; }

.form-footer {
    padding: 1rem 2rem;
    border-top: 1px solid var(--border-soft);
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.75rem;
}

.btn-cancel {
    display: inline-flex;
    align-items: center;
    padding: 11px 22px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.18s ease;
}
.btn-cancel:hover { border-color: var(--ink); color: var(--ink); background: var(--white); }

.btn-submit {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 26px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
}
.btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-submit:active { transform: scale(0.99); }

/* ── ANIMATIONS ── */
@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
}
</style>

<div class="page-wrapper">

    <!-- Page Header -->
    <div class="page-header">
        <div class="header-left">
            <span class="eyebrow-pill">Team</span>
            <h1 class="page-title">Add <em>Employee</em></h1>
        </div>
        <a href="{% url 'employees' %}" class="btn-back">
            <i class="ti ti-arrow-left" style="font-size:13px;"></i> Back
        </a>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="card-bar"></div>

        <form method="POST" class="ajax-form" data-reset-on-success="true">
            {% csrf_token %}

            <div class="card-body">
                <p class="card-sub">Fill in the details below to register a new team member.</p>

                <div class="form-grid">

                    <!-- ── Personal Details ── -->
                    <div class="section-divider"><span>Personal Details</span></div>

                    <div class="field">
                        <label>Employee Name</label>
                        <div class="field-wrap">
                            <input type="text" name="name" class="f-input" placeholder="e.g. Rahul Sharma" required>
                        </div>
                    </div>

                    <div class="field">
                        <label>Phone</label>
                        <div class="field-wrap">
                            <input type="text" name="phone" class="f-input" placeholder="+91 98765 43210" required>
                        </div>
                    </div>

                    <div class="field" style="grid-column: 1 / -1;">
                        <label>Role</label>
                        <div class="field-wrap">
                            <input type="text" name="role" class="f-input" placeholder="e.g. Site Supervisor" required>
                        </div>
                    </div>

                    <!-- ── Salary Details ── -->
                    <div class="section-divider"><span>Salary Details</span></div>

                    <div class="field">
                        <label>Daily Salary</label>
                        <div class="field-wrap">
                            <span class="field-prefix">₹</span>
                            <input type="number" step="0.01" name="salary" class="f-input has-prefix" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="field">
                        <label>Half Day Salary</label>
                        <div class="field-wrap">
                            <span class="field-prefix">₹</span>
                            <input type="number" step="0.01" name="half_salary" class="f-input has-prefix" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="field">
                        <label>Overtime Salary <span class="opt">(optional)</span></label>
                        <div class="field-wrap">
                            <span class="field-prefix">₹</span>
                            <input type="number" step="0.01" name="overtime_salary" class="f-input has-prefix" placeholder="0.00">
                        </div>
                    </div>

                </div>
            </div>

            <!-- Footer -->
            <div class="form-footer">
                <a href="{% url 'employees' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">
                    <i class="ti ti-user-plus" style="font-size:14px;"></i>
                    Add Employee
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
