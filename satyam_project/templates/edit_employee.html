{% extends 'base.html' %}

{% block content %}
<style>
    /* ===== SCOPED DARK THEME WRAPPER ===== */
    .edit-page-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        font-family: 'Inter', 'Poppins', sans-serif;
        /* A subtle animated mesh gradient background */
        background: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 50%),
                    radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 50%),
                    #0f172a;
    }

    /* ===== ULTRA-PREMIUM GLASS FORM ===== */
    .premium-form-card {
        width: 100%;
        max-width: 480px;
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 40px 35px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .premium-form-card h2 {
        text-align: center;
        margin: 0 0 35px 0;
        color: #f8fafc;
        font-weight: 700;
        font-size: 1.75rem;
        letter-spacing: -0.02em;
    }

    /* ===== FLOATING LABEL INPUTS ===== */
    .form-floating {
        position: relative;
        margin-bottom: 20px;
        opacity: 0;
        animation: slideInRight 0.5s ease-out forwards;
    }

    /* Safe CSS-only staggering (No Django template errors) */
    .form-floating:nth-child(2) { animation-delay: 0.1s; }
    .form-floating:nth-child(3) { animation-delay: 0.15s; }
    .form-floating:nth-child(4) { animation-delay: 0.2s; }
    .form-floating:nth-child(5) { animation-delay: 0.25s; }
    .form-floating:nth-child(6) { animation-delay: 0.3s; }
    .form-floating:nth-child(7) { animation-delay: 0.35s; }

    .form-floating input {
        width: 100%;
        padding: 24px 16px 8px; /* Extra padding top for floating label */
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.2);
        color: #f8fafc;
        font-size: 1rem;
        font-weight: 500;
        outline: none;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .form-floating label {
        position: absolute;
        left: 16px;
        top: 16px;
        color: rgba(148, 163, 184, 0.8);
        font-size: 1rem;
        pointer-events: none;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: left top;
    }

    /* Focus & Floating Magic */
    .form-floating input:focus {
        background: rgba(0, 0, 0, 0.3);
        border-color: #818cf8;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .form-floating input:focus ~ label,
    .form-floating input:not(:placeholder-shown) ~ label {
        transform: translateY(-8px) scale(0.75);
        color: #a5b4fc;
        font-weight: 600;
    }

    /* Hide the default placeholder text so floating labels work */
    .form-floating input::placeholder {
        color: transparent;
    }

    /* ===== AURORA GLOW BUTTON ===== */
    .btn-submit-wrapper {
        margin-top: 35px;
        opacity: 0;
        animation: slideInRight 0.5s ease-out 0.4s forwards;
    }

    .btn-aurora {
        position: relative;
        width: 100%;
        padding: 16px;
        border-radius: 14px;
        border: none;
        background: #4f46e5;
        color: white;
        font-size: 1.05rem;
        font-weight: 600;
        cursor: pointer;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1;
    }

    /* The moving gradient layer */
    .btn-aurora::before {
        content: '';
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        background: linear-gradient(120deg, #6366f1, #a855f7, #3b82f6, #6366f1);
        background-size: 200% auto;
        z-index: -1;
        transition: 0.5s;
        animation: gradientShift 3s linear infinite;
    }

    .btn-aurora span {
        position: relative;
        z-index: 2;
        letter-spacing: 0.5px;
    }

    .btn-aurora:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
    }

    .btn-aurora:active {
        transform: scale(0.97);
    }

    /* ===== KEYFRAMES ===== */
    @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInRight {
        from { opacity: 0; transform: translateX(15px); }
        to { opacity: 1; transform: translateX(0); }
    }

    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
    }
</style>

<div class="edit-page-wrapper">
    <div class="premium-form-card">
        <h2>Edit Employee</h2>

        <form method="POST" class="ajax-form" data-after-success="reload">
            {% csrf_token %}

            <div class="form-floating">
                <input type="text" name="name" id="empName" value="{{ emp.name }}" placeholder=" " required>
                <label for="empName">Employee Name</label>
            </div>

            <div class="form-floating">
                <input type="text" name="phone" id="empPhone" value="{{ emp.phone }}" placeholder=" " required>
                <label for="empPhone">Phone Number</label>
            </div>

            <div class="form-floating">
                <input type="text" name="role" id="empRole" value="{{ emp.role }}" placeholder=" " required>
                <label for="empRole">Role / Position</label>
            </div>

            <div class="form-floating">
                <input type="number" name="salary" id="empSalary" value="{{ emp.daily_salary }}" placeholder=" " required>
                <label for="empSalary">Daily Salary</label>
            </div>

            <div class="form-floating">
                <input type="number" step="0.01" name="half_salary" id="empHalfSalary" value="{{ emp.half_day_salary }}" placeholder=" " required>
                <label for="empHalfSalary">Half Day Salary</label>
            </div>

            <div class="form-floating">
                <input type="number" step="0.01" name="overtime_salary" id="empOvertime" value="{{ emp.overtime_salary }}" placeholder=" ">
                <label for="empOvertime">Overtime Salary (Optional)</label>
            </div>

            <div class="btn-submit-wrapper">
                <button type="submit" class="btn-aurora">
                    <span>Update Employee Profile</span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
