{% extends 'base.html' %}

{% block content %}

<h2>Payment History - {{ emp.name }}</h2>

<table class="table">
<tr>
    <th>Date</th>
    <th>Amount Paid</th>
</tr>

{% for p in payments %}
<tr>
    <td>{{ p.date }}</td>
    <td>₹ {{ p.amount_paid }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
