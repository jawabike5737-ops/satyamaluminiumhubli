{% extends 'base.html' %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --cream: #faf8f4;
    --white: #ffffff;
    --ink: #1a1714;
    --muted: #6b6560;
    --faint: #c4bfba;
    --accent: #c8602a;
    --border: #e8e3de;
}

/* Reset */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
}

/* Centering */
.page-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

/* Card */
.card {
    width: 100%;
    max-width: 480px;
    background: var(--white);
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    overflow: hidden;
}

.card-accent {
    height: 4px;
    background: linear-gradient(90deg, var(--accent), #e8956d);
}

.card-body {
    padding: 36px;
}

/* Header */
.card-eyebrow {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 6px;
}

.card-title {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    line-height: 1.2;
}

.card-title em {
    color: var(--accent);
    font-style: italic;
}

.card-subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
}

/* Form */
.form {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.field-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
}

/* Input wrapper */
.field-wrap {
    position: relative;
}

/* ICON FIXED PERFECTLY */
.field-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--faint);
}

/* Special for textarea */
textarea + .field-icon {
    top: 18px;
    transform: none;
}

/* INPUT FIX */
.field-input {
    width: 100%;
    padding: 14px 16px 14px 48px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--cream);
    font-size: 14px;
    outline: none;
}

.field-input::placeholder {
    color: #aaa;
}

.field-input:focus {
    border-color: var(--accent);
    background: #fff;
}

/* TEXTAREA FIX */
textarea.field-input {
    height: 130px;
    resize: none;
    padding-top: 16px;
    line-height: 1.5;
}

/* PRICE FIX */
.price-prefix {
    position: absolute;
    left: 48px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--muted);
}

input[name="price"] {
    padding-left: 72px;
}

/* Divider */
.divider {
    height: 1px;
    background: var(--border);
}

/* Button */
.btn-submit {
    margin-top: 10px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #4f83ff, #2f5bd3);
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-submit:hover {
    transform: translateY(-1px);
    opacity: 0.95;
}
</style>

<div class="page-wrapper">
    <div class="card">
        <div class="card-accent"></div>

        <div class="card-body">

            <div class="card-header">
                <div class="card-eyebrow">SERVICE CATALOG</div>
                <h1 class="card-title">Add a <em>new</em><br>service</h1>
                <p class="card-subtitle">
                    Fill in the details below to list a new service offering.
                </p>
            </div>

            {% if error %}
            <div style="color:red; margin-bottom:10px;">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="form">
                {% csrf_token %}

                <!-- DESCRIPTION -->
                <div>
                    <label class="field-label">Service Description</label>
                    <div class="field-wrap">
                        <textarea
                            name="name"
                            class="field-input"
                            placeholder="Describe the service..."
                            required
                        ></textarea>

                        <svg class="field-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor">
                            <rect x="2" y="2" width="12" height="12" rx="2"/>
                        </svg>
                    </div>
                </div>

                <!-- PRICE -->
                <div>
                    <label class="field-label">Pricing</label>
                    <div class="field-wrap">
                        <input
                            type="number"
                            name="price"
                            class="field-input"
                            placeholder="0.00"
                            required
                        >

                        <span class="price-prefix">₹</span>

                        <svg class="field-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor">
                            <circle cx="8" cy="8" r="6"/>
                        </svg>
                    </div>
                </div>

                <div class="divider"></div>

                <button type="submit" class="btn-submit">
                    Add Service →
                </button>

            </form>

        </div>
    </div>
</div>

{% endblock %}
